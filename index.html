<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生存 | 32周生存模拟</title>
    <style>
        /* 核心风格：暗黑科技风 + 沉浸式叙事 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { 
            background: #0a0a0a; 
            color: #00ff9d; 
            min-height: 100vh;
            padding: 20px;
            background-image: 
                linear-gradient(rgba(0, 255, 157, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }
        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            font-weight: bold;
        }
        .logo span { color: #ff4757; }
        .disclaimer {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            max-width: 300px;
        }
        /* 状态面板（替代原stats） */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .status-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .status-label {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(0, 255, 157, 0.7);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .status-value {
            font-size: 22px;
            font-weight: bold;
            color: #00ff9d;
        }
        .status-value.highlight { color: #ff4757; } /* 瓶颈高亮 */
        /* 核心面板容器 */
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }
        /* 左侧游戏区 */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 面板通用样式 */
        .panel {
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
        }
        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff9d;
        }
        .panel-progress {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.7);
        }
        /* 行动按钮区 */
        .actions-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .action-btn {
            padding: 12px 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 4px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            background: rgba(30, 30, 30, 0.5);
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.3);
            cursor: not-allowed;
            transform: none;
        }
        /* 日志面板 - 重点优化部分 */
        .log-panel {
            height: 280px; /* 增加高度，显示更多日志 */
            overflow-y: auto;
            position: relative;
            background: rgba(0, 10, 5, 0.8); /* 更深的背景色 */
            border: 1px solid rgba(0, 255, 157, 0.4);
        }
        /* 日志滚动条美化 */
        .log-panel::-webkit-scrollbar {
            width: 6px;
        }
        .log-panel::-webkit-scrollbar-track {
            background: rgba(0, 30, 15, 0.5);
            border-radius: 3px;
        }
        .log-panel::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 157, 0.6);
            border-radius: 3px;
        }
        .log-panel::-webkit-scrollbar-thumb:hover {
            background: #00ff9d;
        }
        .log-list {
            list-style: none;
            padding: 5px 0;
        }
        .log-item {
            font-size: 14px; /* 增大字体 */
            padding: 10px 15px; /* 增加内边距 */
            margin: 4px 0; /* 增加项间距 */
            border-radius: 4px; /* 圆角 */
            border-left: 3px solid transparent; /* 左侧标记线 */
            transition: background 0.2s;
        }
        /* 不同类型日志的颜色区分 - 核心优化 */
        .log-item.log-default {
            color: #00ff9d;
            background: rgba(0, 30, 15, 0.3);
            border-left-color: #00ff9d;
        }
        .log-item.log-event {
            color: #66ccff;
            background: rgba(0, 40, 60, 0.3);
            border-left-color: #66ccff;
        }
        .log-item.log-warning {
            color: #ff9966;
            background: rgba(60, 30, 0, 0.3);
            border-left-color: #ff9966;
        }
        .log-item.log-reward {
            color: #ffd166;
            background: rgba(60, 50, 0, 0.3);
            border-left-color: #ffd166;
        }
        /* 日志时间样式优化 */
        .log-time {
            display: inline-block;
            min-width: 80px; /* 固定时间宽度，对齐文本 */
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            margin-right: 12px;
        }
        /* 日志文本样式 */
        .log-text {
            display: inline-block;
            line-height: 1.4;
        }
        /* 右侧信息区 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 图鉴面板 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-height: 280px;
            overflow-y: auto;
        }
        .gallery-item {
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            font-size: 12px;
        }
        .gallery-item.unlocked {
            border-color: #00ff9d;
            background: rgba(0, 40, 20, 0.9);
        }
        .gallery-item.locked {
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.4);
        }
        .gallery-name {
            font-weight: bold;
            margin-bottom: 3px;
            color: #00ff9d;
        }
        .gallery-item.locked .gallery-name { color: rgba(0, 255, 157, 0.4); }
        /* 道具面板 */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            max-height: 250px;
            overflow-y: auto;
        }
        .item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            font-size: 12px;
        }
        .item-info {
            display: flex;
            flex-direction: column;
        }
        .item-name {
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 2px;
        }
        .item-desc {
            color: rgba(0, 255, 157, 0.7);
            font-size: 11px;
        }
        .item-actions {
            display: flex;
            gap: 5px;
        }
        .item-btn {
            padding: 5px 10px;
            background: rgba(0, 40, 20, 0.9);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 3px;
            color: #00ff9d;
            font-size: 11px;
            cursor: pointer;
        }
        .item-btn:disabled {
            background: rgba(30, 30, 30, 0.5);
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.3);
            cursor: not-allowed;
        }
        /* 技能/成就面板 */
        .skills-list, .achievements-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .skill-item, .achievement-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .skill-item.unlocked, .achievement-item.unlocked {
            color: #00ff9d;
        }
        .skill-item.locked, .achievement-item.locked {
            color: rgba(0, 255, 157, 0.4);
        }
        .skill-buff, .achievement-reward {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.6);
        }
        /* 浮动提示容器（固定位置） */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        /* 浮动提示（科技风）- 固定位置版 */
        .stat-toast {
            padding: 8px 15px;
            border-radius: 4px;
            color: #0a0a0a;
            font-weight: bold;
            animation: fadeInUp 0.3s, fadeOut 1.5s 1s forwards;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 120px;
            text-align: center;
        }
        .stat-toast.stat-plus { background: #00ff9d; border: 1px solid #00cc7a; }
        .stat-toast.stat-minus { background: #ff4757; border-color: #e03545; color: white; }
        .stat-toast.stat-reward { background: #ffd166; border-color: #ffc107; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        /* 结局弹窗（科技风全屏） */
        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.5s;
            padding: 20px;
        }
        .ending-content {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.1);
        }
        .ending-title {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            padding-bottom: 15px;
        }
        .ending-stats {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .ending-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .ending-stat-item {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.9);
        }
        .ending-stat-label {
            text-transform: uppercase;
            font-size: 11px;
            color: rgba(0, 255, 157, 0.6);
            margin-bottom: 3px;
        }
        .ending-desc {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(0, 255, 157, 0.9);
            margin-bottom: 30px;
        }
        .restart-btn {
            padding: 12px 30px;
            background: rgba(0, 40, 20, 0.9);
            border: 1px solid #00ff9d;
            border-radius: 4px;
            color: #00ff9d;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .restart-btn:hover {
            background: #00ff9d;
            color: #0a0a0a;
            font-weight: bold;
        }
        /* 响应式适配 */
        @media (max-width: 900px) {
            .panels-container {
                grid-template-columns: 1fr;
            }
            .status-panel {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 600px) {
            .status-panel {
                grid-template-columns: repeat(2, 1fr);
            }
            .ending-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .toast-container {
                top: 10px;
                right: 10px;
            }
            .stat-toast {
                min-width: 100px;
                padding: 6px 10px;
                font-size: 11px;
            }
            .log-item {
                font-size: 13px;
                padding: 8px 10px;
            }
            .log-time {
                min-width: 70px;
            }
        }
    </style>
</head>
<body>
    <!-- 数值提示固定容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- 顶部标题栏 -->
    <div class="header">
        <div class="logo">大学 <span>生存</span></div>
        <div class="disclaimer">
            免责声明：本游戏为虚构作品，所有情节、数据均为艺术创作，仅供娱乐。
        </div>
    </div>

    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <div class="status-label">周数</div>
            <div class="status-value" id="week">1</div>
        </div>
        <div class="status-item">
            <div class="status-label">学习</div>
            <div class="status-value" id="study">50</div>
        </div>
        <div class="status-item">
            <div class="status-label">健康</div>
            <div class="status-value" id="health">80</div>
        </div>
        <div class="status-item">
            <div class="status-label">快乐</div>
            <div class="status-value" id="happiness">70</div>
        </div>
        <div class="status-item">
            <div class="status-label">金钱</div>
            <div class="status-value" id="money">1000</div>
        </div>
        <div class="status-item">
            <div class="status-label">社交</div>
            <div class="status-value" id="social">40</div>
        </div>
    </div>

    <!-- 核心面板容器 -->
    <div class="panels-container">
        <!-- 左侧游戏区 -->
        <div class="game-area">
            <!-- 行动按钮面板 -->
            <div class="panel actions-panel">
                <button class="action-btn" data-action="study">去图书馆学习</button>
                <button class="action-btn" data-action="rest">宿舍休息</button>
                <button class="action-btn" data-action="play">和朋友打游戏</button>
                <button class="action-btn" data-action="parttime">做兼职</button>
                <button class="action-btn" data-action="socialize">参加社团活动</button>
                <button class="action-btn" data-action="exercise">去健身房</button>
                <button class="action-btn" data-action="skip">跳过本周</button>
            </div>

            <!-- 每日目标面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">每日目标</div>
                    <div class="panel-progress" id="goal-progress">0/5</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="goal-text">学习提升5点</div>
                    <div class="status-value">奖励: <span id="goal-reward">+10 金钱</span></div>
                </div>
            </div>

            <!-- 日志面板 -->
            <div class="panel log-panel">
                <div class="panel-header">
                    <div class="panel-title">事件日志</div>
                </div>
                <ul class="log-list" id="log-list"></ul>
            </div>
        </div>

        <!-- 右侧信息区 -->
        <div class="info-area">
            <!-- 技能面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">技能</div>
                    <div class="panel-progress" id="skills-progress">0/4</div>
                </div>
                <div class="skills-list" id="skills-list"></div>
            </div>

            <!-- 成就面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">成就</div>
                    <div class="panel-progress" id="achievements-progress">0/5</div>
                </div>
                <div class="achievements-list" id="achievements-list"></div>
            </div>

            <!-- 道具面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">道具</div>
                </div>
                <div class="items-grid" id="items-list"></div>
            </div>

            <!-- 图鉴面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">事件图鉴</div>
                    <div class="panel-progress" id="gallery-progress">0/12</div>
                </div>
                <div class="gallery-grid" id="gallery-list"></div>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态管理（完全保留原有核心逻辑）
        const gameState = {
            week: 1,
            stats: {
                study: 50,
                health: 80,
                happiness: 70,
                money: 1000,
                social: 40
            },
            dailyGoal: {
                type: 'study',
                target: 5,
                progress: 0,
                reward: { money: 10 }
            },
            achievements: [],
            gameEnded: false,
            monthEvents: [8, 16, 24],
            statBottleneck: 70,
            skills: {
                efficientStudy: { name: '高效学习', condition: (s) => s.study >= 70, unlocked: false, buff: () => ({ study: 2 }) },
                socialStar: { name: '社交达人', condition: (s) => s.social >= 70, unlocked: false, buff: () => ({ social: 2 }) },
                fitnessMaster: { name: '健身达人', condition: (s) => s.health >= 80, unlocked: false, buff: () => ({ health: 3 }) },
                moneyMaster: { name: '理财高手', condition: (s) => s.money >= 1500, unlocked: false, buff: () => ({ money: 5 }) }
            },
            hasSkippedWeek: false,
            chanceCrisisWeeks: [5, 12, 19, 28],
            gallery: {
                total: 12,
                unlocked: [],
                events: [
                    { id: 'event1', name: '偶遇学霸', desc: '图书馆偶遇学霸，学习效率翻倍！' },
                    { id: 'event2', name: '熬夜感冒', desc: '熬夜学习导致感冒，健康下降！' },
                    { id: 'event3', name: '游戏连胜', desc: '游戏开黑连胜，快乐值暴涨！' },
                    { id: 'event4', name: '社团优秀', desc: '社团招新表现优秀，社交值提升！' },
                    { id: 'event5', name: '黑心老板', desc: '兼职遇到黑心老板，少发工资！' },
                    { id: 'event6', name: '教练指导', desc: '健身房遇到教练指导，健康值提升！' },
                    { id: 'event7', name: '高数挂科', desc: '学习值过低，高数挂科！' },
                    { id: 'event8', name: '捡到钱包', desc: '捡到钱包归还失主，获得感谢金！' },
                    { id: 'event9', name: '出门淋雨', desc: '出门忘带伞淋雨，健康值下降！' },
                    { id: 'event10', name: '论文获奖', desc: '论文被推荐为优秀范文，获得奖金！' },
                    { id: 'event11', name: '突发疾病', desc: '突发疾病，需要花钱看病！' },
                    { id: 'event12', name: '认识高管', desc: '认识企业高管，获得高薪兼职机会！' }
                ]
            },
            items: {
                list: [
                    { id: 'book', name: '学霸笔记', count: 0, effect: { study: 10 }, cost: 50, desc: '使用后学习值+10' },
                    { id: 'vitamin', name: '维生素', count: 0, effect: { health: 8 }, cost: 30, desc: '使用后健康值+8' },
                    { id: 'coffee', name: '咖啡', count: 0, effect: { happiness: 5, health: -2 }, cost: 20, desc: '快乐+5，健康-2' },
                    { id: 'ticket', name: '电影票', count: 0, effect: { happiness: 15, social: 5 }, cost: 80, desc: '快乐+15，社交+5' }
                ],
                getProbability: 0.2
            }
        };

        // DOM 元素（适配新UI结构）
        const elements = {
            week: document.getElementById('week'),
            study: document.getElementById('study'),
            health: document.getElementById('health'),
            happiness: document.getElementById('happiness'),
            money: document.getElementById('money'),
            social: document.getElementById('social'),
            logList: document.getElementById('log-list'),
            goalText: document.getElementById('goal-text'),
            goalReward: document.getElementById('goal-reward'),
            goalProgress: document.getElementById('goal-progress'),
            skillsList: document.getElementById('skills-list'),
            skillsProgress: document.getElementById('skills-progress'),
            achievementsList: document.getElementById('achievements-list'),
            achievementsProgress: document.getElementById('achievements-progress'),
            galleryList: document.getElementById('gallery-list'),
            galleryProgress: document.getElementById('gallery-progress'),
            itemsList: document.getElementById('items-list'),
            toastContainer: document.getElementById('toastContainer')
        };

        // 属性名映射（全中文）
        function getStatName(stat) {
            const names = {
                study: '学习',
                health: '健康',
                happiness: '快乐',
                money: '金钱',
                social: '社交'
            };
            return names[stat] || stat;
        }

        // 浮动提示（固定位置版）
        function showStatToast(stat, value, x, y, isReward = false) {
            if (gameState.gameEnded) return;
            
            const toast = document.createElement('div');
            toast.className = `stat-toast ${isReward ? 'stat-reward' : (value > 0 ? 'stat-plus' : 'stat-minus')}`;
            toast.textContent = isReward ? `奖励 +${value} ${getStatName(stat)}` : `${value > 0 ? '+' : ''}${value} ${getStatName(stat)}`;
            
            // 添加到固定容器中
            elements.toastContainer.appendChild(toast);
            
            // 动画结束后移除
            setTimeout(() => {
                toast.remove();
            }, 2500);
        }

        // 属性瓶颈检测（适配新UI高亮）
        function checkStatBottleneck() {
            const stats = ['study', 'health', 'happiness', 'social'];
            stats.forEach(stat => {
                const valueEl = document.getElementById(stat);
                if (gameState.stats[stat] >= gameState.statBottleneck) {
                    valueEl.classList.add('highlight');
                } else {
                    valueEl.classList.remove('highlight');
                }
            });
        }

        // 技能解锁检测 + 面板更新
        function checkSkills() {
            const skills = gameState.skills;
            let unlockedCount = Object.values(skills).filter(s => s.unlocked).length;
            elements.skillsProgress.textContent = `${unlockedCount}/4`;

            let updated = false;
            for (const [key, skill] of Object.entries(skills)) {
                if (!skill.unlocked && skill.condition(gameState.stats)) {
                    skill.unlocked = true;
                    updated = true;
                    logEvent(`技能解锁: ${skill.name}`, 'event');
                    const buff = skill.buff();
                    const centerX = window.innerWidth/2;
                    const centerY = window.innerHeight/2;
                    for (const [stat, value] of Object.entries(buff)) {
                        adjustStat(stat, value, centerX, centerY, true);
                    }
                }
            }

            // 更新技能面板UI
            elements.skillsList.innerHTML = '';
            for (const [key, skill] of Object.entries(skills)) {
                const skillEl = document.createElement('div');
                skillEl.className = `skill-item ${skill.unlocked ? 'unlocked' : 'locked'}`;
                const buff = skill.buff();
                const buffText = Object.entries(buff).map(([s, v]) => `+${v} ${getStatName(s)}`).join(' ');
                skillEl.innerHTML = `
                    <span>${skill.name}</span>
                    <span class="skill-buff">${skill.unlocked ? buffText : '未解锁'}</span>
                `;
                elements.skillsList.appendChild(skillEl);
            }

            // 返回激活的buff
            const activeBuffs = {};
            for (const [key, skill] of Object.entries(skills)) {
                if (skill.unlocked) {
                    const buff = skill.buff();
                    for (const [stat, value] of Object.entries(buff)) {
                        activeBuffs[stat] = (activeBuffs[stat] || 0) + value;
                    }
                }
            }
            return activeBuffs;
        }

        // 成就解锁检测 + 面板更新
        function checkAchievements() {
            const s = gameState.stats;
            const achievements = [
                { id: 'top-student', name: '学霸本霸', condition: s.study >= 90, reward: { money: 100 }, desc: '学习值≥90' },
                { id: 'social-star', name: '社交明星', condition: s.social >= 90, reward: { happiness: 20 }, desc: '社交值≥90' },
                { id: 'money-free', name: '财富自由', condition: s.money >= 2000, reward: { money: 50 }, desc: '金钱≥2000' },
                { id: 'full-attendance', name: '全勤达人', condition: !gameState.hasSkippedWeek, reward: { health: 10 }, desc: '未使用跳过本周' },
                { id: 'all-round', name: '六边形战士', condition: s.study >= 60 && s.health >= 60 && s.happiness >= 60 && s.social >= 60 && s.money >= 600, reward: { all: 5 }, desc: '所有属性≥60' }
            ];

            let updated = false;
            for (const ach of achievements) {
                if (ach.condition && !gameState.achievements.includes(ach.id)) {
                    gameState.achievements.push(ach.id);
                    updated = true;
                    logEvent(`成就解锁: ${ach.name}`, 'reward');
                    
                    const centerX = window.innerWidth/2;
                    const centerY = window.innerHeight/2;
                    if (ach.reward.all) {
                        adjustStat('study', ach.reward.all, centerX, centerY, true);
                        adjustStat('health', ach.reward.all, centerX, centerY, true);
                        adjustStat('happiness', ach.reward.all, centerX, centerY, true);
                        adjustStat('social', ach.reward.all, centerX, centerY, true);
                        adjustStat('money', ach.reward.all, centerX, centerY, true);
                    } else {
                        for (const [stat, value] of Object.entries(ach.reward)) {
                            adjustStat(stat, value, centerX, centerY, true);
                        }
                    }
                }
            }

            // 更新成就面板UI
            elements.achievementsProgress.textContent = `${gameState.achievements.length}/5`;
            elements.achievementsList.innerHTML = '';
            achievements.forEach(ach => {
                const achEl = document.createElement('div');
                achEl.className = `achievement-item ${gameState.achievements.includes(ach.id) ? 'unlocked' : 'locked'}`;
                const rewardText = ach.reward.all ? '全属性+5' : Object.entries(ach.reward).map(([s, v]) => `+${v} ${getStatName(s)}`).join(' ');
                achEl.innerHTML = `
                    <span>${ach.name}</span>
                    <span class="achievement-reward">${ach.desc}</span>
                `;
                elements.achievementsList.appendChild(achEl);
            });
        }

        // 图鉴面板更新
        function updateGalleryPanel() {
            const gallery = gameState.gallery;
            elements.galleryProgress.textContent = `${gallery.unlocked.length}/${gallery.total}`;
            elements.galleryList.innerHTML = '';
            
            gallery.events.forEach(event => {
                const galleryEl = document.createElement('div');
                galleryEl.className = `gallery-item ${gallery.unlocked.includes(event.id) ? 'unlocked' : 'locked'}`;
                galleryEl.innerHTML = `
                    <div class="gallery-name">${event.name}</div>
                    <div>${event.desc}</div>
                `;
                elements.galleryList.appendChild(galleryEl);
            });
        }

        // 解锁图鉴事件
        function unlockGalleryEvent(eventId) {
            const gallery = gameState.gallery;
            if (!gallery.unlocked.includes(eventId)) {
                gallery.unlocked.push(eventId);
                logEvent(`图鉴解锁: ${gallery.events.find(e => e.id === eventId).name}`, 'event');
                updateGalleryPanel();
            }
        }

        // 道具面板更新
        function updateItemsPanel() {
            const items = gameState.items.list;
            elements.itemsList.innerHTML = '';
            
            items.forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = 'item-card';
                itemEl.innerHTML = `
                    <div class="item-info">
                        <div class="item-name">${item.name} (x${item.count})</div>
                        <div class="item-desc">${item.desc} | 价格: ${item.cost}元</div>
                    </div>
                    <div class="item-actions">
                        <button class="item-btn" ${item.count === 0 ? 'disabled' : ''} data-item="${item.id}">使用</button>
                        <button class="item-btn" ${gameState.stats.money < item.cost ? 'disabled' : ''} data-buy="${item.id}">购买</button>
                    </div>
                `;
                elements.itemsList.appendChild(itemEl);
                
                // 绑定使用/购买事件
                itemEl.querySelector(`button[data-item="${item.id}"]`).addEventListener('click', () => useItem(item.id));
                itemEl.querySelector(`button[data-buy="${item.id}"]`).addEventListener('click', () => buyItem(item.id));
            });
        }

        // 使用道具
        function useItem(itemId) {
            if (gameState.gameEnded) return;
            const item = gameState.items.list.find(i => i.id === itemId);
            if (!item || item.count === 0) return;
            
            item.count--;
            logEvent(`使用道具: ${item.name}`, 'event');
            
            const centerX = window.innerWidth/2;
            const centerY = window.innerHeight/2;
            for (const [stat, value] of Object.entries(item.effect)) {
                adjustStat(stat, value, centerX, centerY, true);
            }
            
            updateItemsPanel();
            updateUI();
        }

        // 购买道具
        function buyItem(itemId) {
            if (gameState.gameEnded) return;
            const item = gameState.items.list.find(i => i.id === itemId);
            if (!item || gameState.stats.money < item.cost) return;
            
            gameState.stats.money -= item.cost;
            item.count++;
            logEvent(`购买道具: ${item.name} (花费: ${item.cost}元)`, 'event');
            
            updateItemsPanel();
            updateUI();
        }

        // 随机获得道具
        function randomGetItem() {
            if (Math.random() < gameState.items.getProbability) {
                const items = gameState.items.list;
                const randomItem = items[Math.floor(Math.random() * items.length)];
                randomItem.count++;
                logEvent(`获得道具: ${randomItem.name}`, 'reward');
                updateItemsPanel();
            }
        }

        // 日志记录 - 核心优化：分类颜色+排版
        function logEvent(message, type = 'default') {
            const time = new Date().toLocaleTimeString();
            const logEl = document.createElement('li');
            // 应用不同类型的样式类
            logEl.className = `log-item log-${type}`;
            // 优化排版结构：时间+文本分离
            logEl.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-text">${message}</span>
            `;
            elements.logList.appendChild(logEl);
            // 自动滚动到底部
            elements.logList.scrollTop = elements.logList.scrollHeight;
        }

        // 调整属性值（保留核心逻辑）
        function adjustStat(stat, value, eventX, eventY, isReward = false) {
            if (gameState.gameEnded) return 0;
            const oldValue = gameState.stats[stat];
            
            // 应用技能buff
            const activeBuffs = checkSkills();
            let actualValue = value;
            if (value > 0 && activeBuffs[stat]) {
                actualValue += activeBuffs[stat];
            }
            
            // 属性瓶颈
            if (oldValue >= gameState.statBottleneck && actualValue > 0) {
                actualValue = Math.floor(actualValue / 2);
                if (actualValue < 1) actualValue = 1;
            }
            
            // 属性联动惩罚
            let penalty = 0;
            if (stat === 'health' && oldValue < 30 && value < 0) {
                penalty = -2;
            } else if (stat === 'happiness' && oldValue < 20) {
                penalty = -1;
            }
            
            actualValue += penalty;
            if (penalty < 0) {
                logEvent(`惩罚: ${getStatName(stat)}过低，额外扣减${-penalty}点`, 'warning');
            }
            
            // 最终属性调整
            if (stat === 'money') {
                gameState.stats[stat] = Math.max(0, oldValue + actualValue);
            } else {
                gameState.stats[stat] = Math.max(0, Math.min(100, oldValue + actualValue));
            }
            const finalValue = gameState.stats[stat] - oldValue;
            
            if (finalValue !== 0) {
                showStatToast(stat, finalValue, eventX, eventY, isReward);
                if (stat === gameState.dailyGoal.type && finalValue > 0) {
                    gameState.dailyGoal.progress += finalValue;
                    checkDailyGoal();
                }
            }
            return finalValue;
        }

        // 检查每日目标
        function checkDailyGoal() {
            if (gameState.dailyGoal.progress >= gameState.dailyGoal.target) {
                const rewardStat = ['study', 'health', 'happiness', 'social'][Math.floor(Math.random() * 4)];
                const rewardValue = Math.floor(Math.random() * 5) + 1;
                gameState.stats.money += gameState.dailyGoal.reward.money;
                gameState.stats[rewardStat] = Math.max(0, Math.min(100, gameState.stats[rewardStat] + rewardValue));
                
                logEvent(`目标完成: 获得奖励 +${gameState.dailyGoal.reward.money} 金钱 +${rewardValue} ${getStatName(rewardStat)}`, 'reward');
                showStatToast(rewardStat, rewardValue, window.innerWidth/2, window.innerHeight/2, true);
                resetDailyGoal();
            }
        }

        // 重置每日目标
        function resetDailyGoal() {
            const stats = ['study', 'health', 'happiness', 'social'];
            const randomStat = stats[Math.floor(Math.random() * stats.length)];
            const baseTarget = Math.floor(Math.random() * 8) + 3;
            const difficultyBoost = Math.min(Math.floor(gameState.week / 4), 5);
            const randomTarget = baseTarget + difficultyBoost;
            const rewardMoney = Math.floor(Math.random() * 15) + 10 + difficultyBoost * 2;
            
            gameState.dailyGoal = {
                type: randomStat,
                target: randomTarget,
                progress: 0,
                reward: { money: rewardMoney }
            };
            
            elements.goalText.textContent = `${getStatName(randomStat)}提升${randomTarget}点`;
            elements.goalReward.textContent = `+${rewardMoney} 金钱`;
            elements.goalProgress.textContent = `0/${randomTarget}`;
        }

        // 处理每周事件
        function handleWeeklyEvents() {
            // 月度事件
            if (gameState.monthEvents.includes(gameState.week)) {
                const events = [
                    { id: 'event1', desc: '月考来临！学习值大幅提升', stat: 'study', value: 15, penaltyStat: 'happiness', penaltyValue: -5 },
                    { id: 'event2', desc: '校园体检！健康值小幅提升', stat: 'health', value: 8 },
                    { id: 'event3', desc: '社团招新！社交值大幅提升', stat: 'social', value: 20, penaltyStat: 'study', penaltyValue: -3 }
                ];
                const randomEvent = events[Math.floor(Math.random() * events.length)];
                unlockGalleryEvent(randomEvent.id);
                logEvent(`月度事件: ${randomEvent.desc}`, 'event');
                
                const centerX = window.innerWidth/2;
                const centerY = window.innerHeight/2;
                adjustStat(randomEvent.stat, randomEvent.value, centerX, centerY);
                
                if (randomEvent.penaltyStat) {
                    adjustStat(randomEvent.penaltyStat, randomEvent.penaltyValue, centerX, centerY);
                }
            }
            
            // 危机周事件
            if (gameState.chanceCrisisWeeks.includes(gameState.week)) {
                const crises = [
                    { id: 'event7', desc: '高数挂科危机！学习值不足60将扣减更多', check: s => s.study < 60, stat: 'study', value: -10, penaltyStat: 'happiness', penaltyValue: -15 },
                    { id: 'event11', desc: '突发疾病！健康值不足70将扣减更多', check: s => s.health < 70, stat: 'health', value: -15, penaltyStat: 'money', penaltyValue: -200 },
                    { id: 'event5', desc: '兼职被骗！金钱值不足800将扣减更多', check: s => s.money < 800, stat: 'money', value: -100, penaltyStat: 'happiness', penaltyValue: -10 }
                ];
                const randomCrisis = crises[Math.floor(Math.random() * crises.length)];
                unlockGalleryEvent(randomCrisis.id);
                
                const centerX = window.innerWidth/2;
                const centerY = window.innerHeight/2;
                if (randomCrisis.check(gameState.stats)) {
                    logEvent(`危机事件: ${randomCrisis.desc} (触发惩罚)`, 'warning');
                    adjustStat(randomCrisis.stat, randomCrisis.value, centerX, centerY);
                    adjustStat(randomCrisis.penaltyStat, randomCrisis.penaltyValue, centerX, centerY);
                } else {
                    logEvent(`危机事件: ${randomCrisis.desc} (成功规避)`, 'event');
                    adjustStat('happiness', 5, centerX, centerY);
                }
            }
            
            // 随机道具获取
            randomGetItem();
        }

        // 检查游戏结束条件
        function checkGameEnd() {
            if (gameState.week >= 32) {
                gameState.gameEnded = true;
                showEnding();
                return true;
            }
            
            // 失败条件
            const stats = gameState.stats;
            if (stats.study <= 0 || stats.health <= 0 || stats.happiness <= 0) {
                gameState.gameEnded = true;
                showEnding(false);
                return true;
            }
            
            return false;
        }

        // 显示结局
        function showEnding(isSuccess = true) {
            const endingModal = document.createElement('div');
            endingModal.className = 'ending-modal';
            
            let endingTitle, endingDesc;
            const stats = gameState.stats;
            
            if (!isSuccess) {
                endingTitle = '游戏失败';
                if (stats.study <= 0) endingDesc = '你的学习值过低，被学校劝退了...';
                else if (stats.health <= 0) endingDesc = '你的健康值过低，被迫休学治疗...';
                else if (stats.happiness <= 0) endingDesc = '你的快乐值过低，陷入抑郁状态...';
            } else {
                endingTitle = '游戏成功';
                if (stats.study >= 90) endingDesc = '你以优异的成绩完成了大学学业，获得了保研资格！';
                else if (stats.social >= 90) endingDesc = '你在大学积累了广泛的人脉，毕业即获得名企offer！';
                else if (stats.money >= 2000) endingDesc = '你在大学实现了经济独立，毕业创业成功！';
                else endingDesc = '你顺利完成了大学学业，开启了人生新篇章！';
            }
            
            endingModal.innerHTML = `
                <div class="ending-content">
                    <div class="ending-title">${endingTitle}</div>
                    <div class="ending-stats">
                        <div class="ending-stats-grid">
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">学习</div>
                                <div>${stats.study}</div>
                            </div>
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">健康</div>
                                <div>${stats.health}</div>
                            </div>
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">快乐</div>
                                <div>${stats.happiness}</div>
                            </div>
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">金钱</div>
                                <div>${stats.money}</div>
                            </div>
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">社交</div>
                                <div>${stats.social}</div>
                            </div>
                            <div class="ending-stat-item">
                                <div class="ending-stat-label">解锁成就</div>
                                <div>${gameState.achievements.length}/5</div>
                            </div>
                        </div>
                    </div>
                    <div class="ending-desc">${endingDesc}</div>
                    <button class="restart-btn">重新开始</button>
                </div>
            `;
            
            document.body.appendChild(endingModal);
            
            // 重新开始按钮事件
            endingModal.querySelector('.restart-btn').addEventListener('click', () => {
                location.reload();
            });
        }

        // 更新UI
        function updateUI() {
            elements.week.textContent = gameState.week;
            elements.study.textContent = gameState.stats.study;
            elements.health.textContent = gameState.stats.health;
            elements.happiness.textContent = gameState.stats.happiness;
            elements.money.textContent = gameState.stats.money;
            elements.social.textContent = gameState.stats.social;
            
            elements.goalProgress.textContent = `${gameState.dailyGoal.progress}/${gameState.dailyGoal.target}`;
            
            checkStatBottleneck();
            checkSkills();
            checkAchievements();
            updateGalleryPanel();
            updateItemsPanel();
        }

        // 处理行动按钮点击
        function handleAction(action, event) {
            if (gameState.gameEnded) return;
            
            const x = event.clientX;
            const y = event.clientY;
            
            switch(action) {
                case 'study':
                    logEvent('行动: 去图书馆学习', 'event');
                    adjustStat('study', 10, x, y);
                    adjustStat('health', -2, x, y);
                    adjustStat('happiness', -3, x, y);
                    break;
                case 'rest':
                    logEvent('行动: 宿舍休息', 'event');
                    adjustStat('health', 8, x, y);
                    adjustStat('happiness', 5, x, y);
                    adjustStat('study', -1, x, y);
                    break;
                case 'play':
                    logEvent('行动: 和朋友打游戏', 'event');
                    adjustStat('happiness', 12, x, y);
                    adjustStat('study', -5, x, y);
                    adjustStat('health', -1, x, y);
                    adjustStat('social', 3, x, y);
                    break;
                case 'parttime':
                    logEvent('行动: 做兼职', 'event');
                    adjustStat('money', 50, x, y);
                    adjustStat('study', -4, x, y);
                    adjustStat('health', -3, x, y);
                    adjustStat('happiness', -2, x, y);
                    break;
                case 'socialize':
                    logEvent('行动: 参加社团活动', 'event');
                    adjustStat('social', 15, x, y);
                    adjustStat('happiness', 8, x, y);
                    adjustStat('study', -3, x, y);
                    adjustStat('health', -1, x, y);
                    break;
                case 'exercise':
                    logEvent('行动: 去健身房', 'event');
                    adjustStat('health', 10, x, y);
                    adjustStat('happiness', 5, x, y);
                    adjustStat('money', -20, x, y);
                    break;
                case 'skip':
                    logEvent('行动: 跳过本周', 'warning');
                    gameState.hasSkippedWeek = true;
                    break;
            }
            
            // 推进周数
            gameState.week++;
            logEvent(`第${gameState.week-1}周结束，进入第${gameState.week}周`, 'default');
            
            // 处理每周事件
            handleWeeklyEvents();
            
            // 检查游戏结束
            if (!checkGameEnd()) {
                updateUI();
            }
        }

        // 初始化游戏
        function initGame() {
            // 绑定行动按钮事件
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const action = btn.dataset.action;
                    handleAction(action, e);
                });
            });
            
            // 初始化面板
            resetDailyGoal();
            updateUI();
            logEvent('游戏开始！祝你在大学生存32周', 'default');
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
