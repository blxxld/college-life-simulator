<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大一生活模拟器</title>
    <!-- 外部样式文件 -->
    <link rel="stylesheet" href="ui-style.css">
    <style>
        /* 游戏专属样式（不通用的部分） */
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .game-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: var(--color-text-light);
        }

        .week-info {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ccc;
        }

        .scene-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: #222;
            padding: 30px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .option-buttons, .event-option-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn, .event-option-btn {
            padding: 20px 10px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            cursor: pointer;
            transition: background-color var(--transition-fast);
        }

        .option-btn:hover, .event-option-btn:hover {
            background-color: #444;
        }

        /* 提示框样式 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.9);
            padding: 25px 40px;
            border-radius: var(--radius-sm);
            font-size: 1.3rem;
            z-index: 1001;
            display: none;
            text-align: center;
            color: white;
        }

        /* 结局弹窗样式 */
        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }

        .ending-content {
            background-color: #222;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .ending-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .ending-desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
            line-height: 1.6;
        }

        .ending-stats {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #eee;
        }

        .restart-btn {
            padding: 18px 30px;
            font-size: 1.2rem;
            background-color: #4a90e2;
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color var(--transition-fast);
        }

        .restart-btn:hover {
            background-color: #357abd;
        }

        /* 通用隐藏类 */
        .hidden {
            display: none !important;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .game-title {
                font-size: 1.8rem;
            }
            
            .week-info {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body class="dark-mode">
    <div class="game-container">
        <h1 class="game-title">大一生活模拟器</h1>
        <div class="week-info" id="weekDisplay">第1周</div>

        <!-- 随机事件容器 -->
        <div class="event-container hidden" id="eventContainer">
            <h2 class="event-title" id="eventTitle"></h2>
            <div class="event-option-buttons" id="eventOptionButtons"></div>
        </div>

        <!-- 场景按钮容器 -->
        <div class="scene-buttons" id="sceneButtonsContainer">
            <button class="scene-btn" data-scene="dorm">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/bedroom.png" alt="宿舍" class="scene-icon">
                宿舍
            </button>
            <button class="scene-btn" data-scene="library">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/library.png" alt="图书馆" class="scene-icon">
                图书馆
            </button>
            <button class="scene-btn" data-scene="canteen">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/restaurant.png" alt="食堂" class="scene-icon">
                食堂
            </button>
            <button class="scene-btn" data-scene="playground">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/sport.png" alt="操场" class="scene-icon">
                操场
            </button>
            <button class="scene-btn" data-scene="club">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/team.png" alt="社团" class="scene-icon">
                社团
            </button>
            <button class="scene-btn" data-scene="parttime">
                <img src="https://img.icons8.com/ios-filled/200/1E50B3/work.png" alt="兼职" class="scene-icon">
                兼职
            </button>
        </div>

        <!-- 属性统计容器 -->
        <div class="stats-container">
            <div class="progress-container">
                <div class="progress-label">
                    <span>绩点</span>
                    <span id="gpaValue">50</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill gpa" id="gpaBar" style="width:50%"></div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-label">
                    <span>社交</span>
                    <span id="socialValue">50</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill social" id="socialBar" style="width:50%"></div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-label">
                    <span>健康</span>
                    <span id="healthValue">50</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill health" id="healthBar" style="width:50%"></div>
                </div>
            </div>
            <div class="progress-container">
                <div class="progress-label">
                    <span>金钱</span>
                    <span id="moneyValue">50</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill money" id="moneyBar" style="width:50%"></div>
                </div>
            </div>
        </div>

        <!-- 场景弹窗 -->
        <div class="modal hidden" id="sceneModal">
            <div class="modal-content">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="option-buttons" id="optionButtons"></div>
            </div>
        </div>

        <!-- 提示框 -->
        <div class="toast" id="toast"></div>

        <!-- 结局弹窗 -->
        <div class="ending-modal hidden" id="endingModal">
            <div class="ending-content">
                <h2 class="ending-title" id="endingTitle"></h2>
                <p class="ending-desc" id="endingDesc"></p>
                <div class="ending-stats" id="endingStats"></div>
                <button class="restart-btn" id="restartBtn">重新开始大学</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 游戏核心数据 ==========
        const GAME_CONFIG = {
            MAX_WEEK: 16, // 大一总周数
            STAT_MIN: 0,  // 属性最小值
            STAT_MAX: 100 // 属性最大值
        };

        // 初始化游戏数据
        let gameData = {
            week: 1,
            stats: { 
                gpa: 50,    // 绩点
                social: 50, // 社交
                health: 50, // 健康
                money: 50   // 金钱
            }
        };

        // ========== 场景配置 ==========
        const sceneConfig = {
            dorm: {
                name: "宿舍",
                options: [
                    { text: "打游戏", changes: { gpa: -5, social: +5, health: -3, money: 0 } },
                    { text: "睡觉", changes: { gpa: 0, social: -2, health: +10, money: 0 } },
                    { text: "追剧", changes: { gpa: -3, social: +2, health: -1, money: 0 } }
                ]
            },
            library: {
                name: "图书馆",
                options: [
                    { text: "刷题", changes: { gpa: +10, social: -5, health: -2, money: 0 } },
                    { text: "发呆", changes: { gpa: 0, social: 0, health: 0, money: 0 } },
                    { text: "占座", changes: { gpa: +2, social: -3, health: -1, money: 0 } }
                ]
            },
            canteen: {
                name: "食堂",
                options: [
                    { text: "吃大餐", changes: { gpa: 0, social: +3, health: +5, money: -10 } },
                    { text: "吃泡面", changes: { gpa: 0, social: 0, health: -2, money: -2 } },
                    { text: "蹭饭", changes: { gpa: 0, social: +8, health: +3, money: 0 } }
                ]
            },
            playground: {
                name: "操场",
                options: [
                    { text: "跑步", changes: { gpa: 0, social: 0, health: +10, money: 0 } },
                    { text: "打球", changes: { gpa: 0, social: +8, health: +5, money: 0 } },
                    { text: "散步", changes: { gpa: 0, social: +3, health: +3, money: 0 } }
                ]
            },
            club: {
                name: "社团",
                options: [
                    { text: "参加活动", changes: { gpa: -3, social: +10, health: -1, money: -5 } },
                    { text: "当干事", changes: { gpa: -5, social: +8, health: -3, money: 0 } },
                    { text: "摸鱼", changes: { gpa: 0, social: +2, health: 0, money: 0 } }
                ]
            },
            parttime: {
                name: "兼职",
                options: [
                    { text: "发传单", changes: { gpa: 0, social: +2, health: -5, money: +20 } },
                    { text: "家教", changes: { gpa: +5, social: +3, health: -3, money: +50 } },
                    { text: "奶茶店打工", changes: { gpa: -2, social: +5, health: -4, money: +30 } }
                ]
            }
        };

        // ========== 随机事件配置 ==========
        const eventLibrary = [
            {
                title: "随机事件：捡到100元",
                options: [
                    { text: "上交辅导员", changes: { gpa: +5, social: +3, money: 0 } },
                    { text: "自己留着花", changes: { gpa: -3, money: +100 } },
                    { text: "请室友喝奶茶", changes: { social: +10, money: -50 } }
                ]
            },
            {
                title: "随机事件：感冒了",
                options: [
                    { text: "硬扛上课", changes: { gpa: +2, health: -10 } },
                    { text: "请假休息", changes: { gpa: -5, health: +5 } },
                    { text: "买药吃", changes: { health: +3, money: -15 } }
                ]
            },
            {
                title: "随机事件：收到表白",
                options: [
                    { text: "答应对方", changes: { gpa: -8, social: +15, health: +2, money: -20 } },
                    { text: "委婉拒绝", changes: { social: -5 } },
                    { text: "假装没看见", changes: { gpa: +2, social: -8 } }
                ]
            },
            {
                title: "随机事件：考试临近",
                options: [
                    { text: "通宵复习", changes: { gpa: +15, health: -10 } },
                    { text: "佛系摆烂", changes: { gpa: -10, social: +5 } },
                    { text: "抱学霸大腿", changes: { gpa: +8, social: +8, money: -10 } }
                ]
            },
            {
                title: "随机事件：宿舍查寝",
                options: [
                    { text: "提前收拾", changes: { social: +5 } },
                    { text: "假装不在", changes: { social: -3 } },
                    { text: "贿赂舍长", changes: { social: +3, money: -20 } }
                ]
            }
        ];

        // 扩展随机事件（2.0新增）
        const campusEvents = [
            {
                desc: "早八课老师突然点名，你选择：",
                options: [
                    {"text": "火速赶到", changes: { gpa: 5, health: -3 }},
                    {"text": "请假", changes: { social: -2, health: 2 }},
                    {"text": "翘课", changes: { gpa: -5, money: 2 }}
                ]
            },
            {
                desc: "食堂排队人巨多，马上要上课了，你选择：",
                options: [
                    {"text": "继续排队", changes: { gpa: -3, health: 2 }},
                    {"text": "买面包带走", changes: { money: -3, health: 1 }},
                    {"text": "插队快速买饭", changes: { social: -5, gpa: 2 }}
                ]
            },
            {
                desc: "小组作业队友全躺平，你选择：",
                options: [
                    {"text": "自己做完", changes: { gpa: 5, health: -3 }},
                    {"text": "催队友一起做", changes: { social: -2, gpa: 3 }},
                    {"text": "一起划水", changes: { gpa: -5, health: 2 }}
                ]
            },
            {
                desc: "晚上宿舍断电断网，你选择：",
                options: [
                    {"text": "用流量赶作业", changes: { gpa: 3, money: -2 }},
                    {"text": "直接睡觉", changes: { health: 3, gpa: -2 }},
                    {"text": "和室友聊天", changes: { social: 3, health: -1 }}
                ]
            },
            {
                desc: "体测800米/1000米轮到你了，你选择：",
                options: [
                    {"text": "全力跑完", changes: { health: -3, social: 3 }},
                    {"text": "慢慢慢跑", changes: { health: 1, gpa: -2 }},
                    {"text": "申请缓测", changes: { gpa: -3, health: 3 }}
                ]
            }
            // 其他事件省略（可按需添加）
        ];

        // 合并所有事件
        const allEvents = [...eventLibrary, ...campusEvents.map(item => ({
            title: item.desc,
            options: item.options
        }))];

        // ========== DOM 元素获取 ==========
        const dom = {
            weekDisplay: document.getElementById('weekDisplay'),
            sceneButtonsContainer: document.getElementById('sceneButtonsContainer'),
            eventContainer: document.getElementById('eventContainer'),
            eventTitle: document.getElementById('eventTitle'),
            eventOptionButtons: document.getElementById('eventOptionButtons'),
            sceneModal: document.getElementById('sceneModal'),
            modalTitle: document.getElementById('modalTitle'),
            optionButtons: document.getElementById('optionButtons'),
            toast: document.getElementById('toast'),
            endingModal: document.getElementById('endingModal'),
            endingTitle: document.getElementById('endingTitle'),
            endingDesc: document.getElementById('endingDesc'),
            endingStats: document.getElementById('endingStats'),
            restartBtn: document.getElementById('restartBtn'),
            statElements: {
                gpa: { bar: document.getElementById('gpaBar'), value: document.getElementById('gpaValue') },
                social: { bar: document.getElementById('socialBar'), value: document.getElementById('socialValue') },
                health: { bar: document.getElementById('healthBar'), value: document.getElementById('healthValue') },
                money: { bar: document.getElementById('moneyBar'), value: document.getElementById('moneyValue') }
            }
        };

        // ========== 工具函数 ==========
        /**
         * 保存游戏数据到本地存储
         */
        function saveGame() {
            try {
                localStorage.setItem('freshmanSimData', JSON.stringify(gameData));
            } catch (e) {
                console.warn('保存游戏数据失败:', e);
            }
        }

        /**
         * 从本地存储加载游戏数据
         */
        function loadGame() {
            try {
                const saved = localStorage.getItem('freshmanSimData');
                if (saved) {
                    const parsedData = JSON.parse(saved);
                    // 验证数据结构
                    if (parsedData.week && parsedData.stats) {
                        gameData = parsedData;
                    }
                }
            } catch (e) {
                console.warn('加载游戏数据失败，使用默认数据:', e);
            }
        }

        /**
         * 更新属性值（带边界校验）
         * @param {Object} changes - 属性变化值
         */
        function applyStatChanges(changes) {
            for (let stat in changes) {
                if (gameData.stats.hasOwnProperty(stat)) {
                    const newValue = gameData.stats[stat] + (changes[stat] || 0);
                    gameData.stats[stat] = Math.max(GAME_CONFIG.STAT_MIN, Math.min(GAME_CONFIG.STAT_MAX, newValue));
                }
            }
            saveGame();
            updateUI();
        }

        /**
         * 更新UI显示
         */
        function updateUI() {
            // 更新周数显示
            dom.weekDisplay.textContent = `第${gameData.week}周`;
            
            // 更新属性进度条和数值
            for (let stat in gameData.stats) {
                if (dom.statElements[stat]) {
                    const value = gameData.stats[stat];
                    dom.statElements[stat].value.textContent = value;
                    dom.statElements[stat].bar.style.width = `${value}%`;
                    
                    // 触发进度条闪烁动画
                    dom.statElements[stat].bar.classList.add('flash');
                    setTimeout(() => {
                        dom.statElements[stat].bar.classList.remove('flash');
                    }, 1000);
                }
            }
        }

        /**
         * 显示提示框
         * @param {string} msg - 提示信息
         */
        function showToast(msg) {
            dom.toast.textContent = msg;
            dom.toast.style.display = 'block';
            setTimeout(() => {
                dom.toast.style.display = 'none';
            }, 2000);
        }

        /**
         * 进入下一周
         */
        function nextWeek() {
            gameData.week++;
            showToast(`第${gameData.week - 1}周结束`);
            
            // 检查是否到达结局
            const isEnd = checkEnding();
            if (!isEnd) {
                // 触发随机事件
                checkRandomEvent();
            }
        }

        // ========== 事件处理函数 ==========
        /**
         * 检查并触发随机事件
         */
        function checkRandomEvent() {
            // 显示场景按钮，隐藏事件容器
            dom.sceneButtonsContainer.classList.remove('hidden');
            dom.eventContainer.classList.add('hidden');
            
            // 30%概率触发随机事件
            if (Math.random() <= 0.3) {
                const randomEvent = allEvents[Math.floor(Math.random() * allEvents.length)];
                showRandomEvent(randomEvent);
            }
        }

        /**
         * 显示随机事件弹窗
         * @param {Object} event - 事件配置
         */
        function showRandomEvent(event) {
            // 隐藏场景按钮，显示事件容器
            dom.sceneButtonsContainer.classList.add('hidden');
            dom.eventContainer.classList.remove('hidden');
            
            dom.eventTitle.textContent = event.title || event.desc;
            dom.eventOptionButtons.innerHTML = '';
            
            event.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'event-option-btn';
                btn.textContent = `${index + 1}. ${opt.text}`;
                btn.addEventListener('click', () => {
                    applyStatChanges(opt.changes || opt.attr);
                    nextWeek();
                });
                dom.eventOptionButtons.appendChild(btn);
            });
        }

        /**
         * 打开场景选择弹窗
         * @param {string} sceneKey - 场景标识
         */
        function openSceneModal(sceneKey) {
            const scene = sceneConfig[sceneKey];
            if (!scene) return;
            
            dom.modalTitle.textContent = scene.name;
            dom.optionButtons.innerHTML = '';
            
            scene.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${index + 1}. ${opt.text}`;
                btn.addEventListener('click', () => {
                    applyStatChanges(opt.changes);
                    dom.sceneModal.classList.add('hidden');
                    nextWeek();
                });
                dom.optionButtons.appendChild(btn);
            });
            
            dom.sceneModal.classList.remove('hidden');
        }

        /**
         * 检查游戏结局
         * @returns {boolean} - 是否到达结局
         */
        function checkEnding() {
            if (gameData.week <= GAME_CONFIG.MAX_WEEK) return false;

            const { gpa, social, money, health } = gameData.stats;
            let title, desc;

            if (gpa > 80) {
                title = "🎉 保研预备役";
                desc = "大一就打下了坚实基础，保研稳了！";
            } else if (social > 80) {
                title = "🌟 社团风云人物";
                desc = "人脉拉满，校园里无人不识！";
            } else if (money > 80) {
                title = "💸 兼职小老板";
                desc = "经济独立，大学生活自由又滋润！";
            } else if (gpa < 20) {
                title = "⚠️ 留级警告";
                desc = "学业严重亮起红灯，再不努力就要留级了！";
            } else if (health < 10) {
                title = "🤒 体测危机";
                desc = "身体被掏空，体测根本过不了！";
            } else {
                title = "📚 平凡大学生";
                desc = "平平淡淡才是真，平安度过大一。";
            }

            // 更新结局弹窗内容
            dom.endingTitle.textContent = title;
            dom.endingDesc.textContent = desc;
            dom.endingStats.innerHTML = `
                绩点：${gpa}<br>
                社交：${social}<br>
                健康：${health}<br>
                金钱：${money}
            `;
            
            // 显示结局弹窗
            dom.endingModal.classList.remove('hidden');
            return true;
        }

        /**
         * 重置游戏
         */
        function resetGame() {
            gameData = { 
                week: 1, 
                stats: { gpa: 50, social: 50, health: 50, money: 50 } 
            };
            saveGame();
            dom.endingModal.classList.add('hidden');
            updateUI();
            checkRandomEvent();
        }

        // ========== 初始化 ==========
        function initGame() {
            // 加载保存的游戏数据
            loadGame();
            
            // 更新UI
            updateUI();
            
            // 检查结局
            if (!checkEnding()) {
                // 触发随机事件
                checkRandomEvent();
            }

            // 绑定场景按钮事件
            document.querySelectorAll('.scene-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    openSceneModal(btn.dataset.scene);
                });
            });

            // 绑定重启按钮事件
            dom.restartBtn.addEventListener('click', resetGame);

            // 绑定弹窗点击关闭事件
            dom.sceneModal.addEventListener('click', (e) => {
                if (e.target === dom.sceneModal) {
                    dom.sceneModal.classList.add('hidden');
                }
            });
        }

        // 页面加载完成后初始化游戏
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
