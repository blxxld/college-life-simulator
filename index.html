<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生存 | 32周生存模拟</title>
    <style>
        /* 核心风格：暗黑科技风 + 沉浸式叙事 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: #0a0a0a;
            color: #00ff9d;
            min-height: 100vh;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 157, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }
        
        /* ============ 新手引导样式 ============ */
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            display: none;
        }
        .guide-overlay.active { display: block; }
        
        .guide-highlight {
            position: fixed;
            z-index: 9999;
            border: 3px solid #00ff9d;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1);
            pointer-events: none;
            animation: guidePulse 1.5s infinite;
        }
        @keyframes guidePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.8), inset 0 0 50px rgba(0, 255, 157, 0.2); }
        }
        
        .guide-tooltip {
            position: fixed;
            z-index: 10000;
            background: rgba(0, 20, 10, 0.95);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 20px;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.3);
        }
        .guide-tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .guide-tooltip-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.9);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .guide-tooltip-btn {
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .guide-tooltip-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        .guide-arrow {
            position: fixed;
            z-index: 9999;
            font-size: 40px;
            color: #00ff9d;
            animation: guideBounce 1s infinite;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
        }
        @keyframes guideBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ============ 剧情弹窗样式 ============ */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .story-modal.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .story-content {
            max-width: 600px;
            width: 90%;
            background: rgba(0, 20, 10, 0.9);
            border: 2px solid #00ff9d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 255, 157, 0.2);
        }
        .story-header {
            background: rgba(0, 40, 20, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .story-chapter {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .story-title {
            font-size: 20px;
            font-weight: bold;
            color: #00ff9d;
            letter-spacing: 1px;
        }
        .story-body {
            padding: 25px;
        }
        .story-character {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .story-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.2);
            border: 2px solid #00ff9d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .story-dialogue {
            flex: 1;
        }
        .story-name {
            font-size: 14px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 5px;
        }
        .story-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
        }
        .story-choices {
            padding: 20px;
            background: rgba(0, 10, 5, 0.5);
            border-top: 1px solid rgba(0, 255, 157, 0.2);
        }
        .story-choice {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 6px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
        }
        .story-choice:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            transform: translateX(5px);
        }
        .story-choice:last-child { margin-bottom: 0; }
        .story-close {
            background: none;
            border: none;
            color: rgba(0, 255, 157, 0.6);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .story-close:hover { color: #00ff9d; }
        
        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            font-weight: bold;
        }
        .logo span { color: #ff4757; }
        .disclaimer {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            max-width: 300px;
        }
        /* 状态面板（替代原stats） */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .status-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .status-label {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(0, 255, 157, 0.7);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .status-value {
            font-size: 22px;
            font-weight: bold;
            color: #00ff9d;
        }
        .status-value.highlight { color: #ff4757; } /* 瓶颈高亮 */
        /* 核心面板容器 */
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }
        /* 左侧游戏区 */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 面板通用样式 */
        .panel {
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
        }
        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff9d;
        }
        .panel-progress {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.7);
        }
        /* 行动按钮区 */
        .actions-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .action-btn {
            padding: 12px 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 4px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            background: rgba(30, 30, 30, 0.5);
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.3);
            cursor: not-allowed;
            transform: none;
        }
        /* 日志面板 - 重点优化部分 */
        .log-panel {
            height: 280px;
            overflow-y: auto;
            position: relative;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 255, 157, 0.4);
        }
        .log-panel::-webkit-scrollbar { width: 6px; }
        .log-panel::-webkit-scrollbar-track { background: rgba(0, 30, 15, 0.5); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 157, 0.6); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb:hover { background: #00ff9d; }
        .log-list { list-style: none; padding: 5px 0; }
        .log-item {
            font-size: 14px;
            padding: 10px 15px;
            margin: 4px 0;
            border-radius: 4px;
            border-left: 3px solid transparent;
            transition: background 0.2s;
        }
        .log-item.log-default { color: #00ff9d; background: rgba(0, 30, 15, 0.3); border-left-color: #00ff9d; }
        .log-item.log-event { color: #66ccff; background: rgba(0, 40, 60, 0.3); border-left-color: #66ccff; }
        .log-item.log-warning { color: #ff9966; background: rgba(60, 30, 0, 0.3); border-left-color: #ff9966; }
        .log-item.log-reward { color: #ffd166; background: rgba(60, 50, 0, 0.3); border-left-color: #ffd166; }
        .log-item.log-story { color: #ff79c6; background: rgba(40, 0, 30, 0.3); border-left-color: #ff79c6; }
        .log-time {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.5);
            margin-right: 8px;
        }
        /* 右侧信息区 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .skills-list, .achievements-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .skill-item, .achievement-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .skill-item.unlocked, .achievement-item.unlocked { color: #00ff9d; }
        .skill-item.locked, .achievement-item.locked { color: rgba(0, 255, 157, 0.4); }
        .skill-buff, .achievement-reward {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.6);
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .item-card {
            padding: 10px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .item-card:hover {
            background: rgba(0, 40, 20, 0.8);
            border-color: #00ff9d;
        }
        .item-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .item-name { font-size: 12px; color: #00ff9d; margin-bottom: 5px; }
        .item-count { font-size: 10px; color: rgba(0, 255, 157, 0.6); }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .gallery-item {
            padding: 8px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .gallery-item.unlocked { opacity: 1; border-color: #00ff9d; }
        /* 浮动提示容器（固定位置） */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .stat-toast {
            padding: 8px 15px;
            border-radius: 4px;
            color: #0a0a0a;
            font-weight: bold;
            animation: fadeInUp 0.3s, fadeOut 1.5s 1s forwards;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 120px;
            text-align: center;
        }
        .stat-toast.stat-plus { background: #00ff9d; border: 1px solid #00cc7a; }
        .stat-toast.stat-minus { background: #ff4757; border-color: #e03545; color: white; }
        .stat-toast.stat-reward { background: #ffd166; border-color: #ffc107; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        /* 结局弹窗（科技风全屏） */
        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.5s;
            padding: 20px;
        }
        .ending-content {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.1);
        }
        .ending-title {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            padding-bottom: 15px;
        }
        .ending-stats {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .ending-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .ending-stat-item {
            font-size: 14px;
            padding: 10px;
            background: rgba(0, 20, 10, 0.5);
            border-radius: 4px;
        }
        .ending-desc {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(0, 255, 157, 0.9);
            margin: 20px 0;
        }
        .restart-btn {
            padding: 15px 40px;
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .restart-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        .hidden { display: none !important; }
        /* 响应式 */
        @media (max-width: 800px) {
            .panels-container { grid-template-columns: 1fr; }
            .info-area { order: -1; }
            .status-panel { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 新手引导元素 -->
    <div class="guide-overlay" id="guideOverlay"></div>
    <div class="guide-highlight" id="guideHighlight"></div>
    <div class="guide-tooltip" id="guideTooltip">
        <div class="guide-tooltip-title" id="guideTitle">引导标题</div>
        <div class="guide-tooltip-text" id="guideText">引导内容</div>
        <button class="guide-tooltip-btn" id="guideBtn">下一步</button>
    </div>
    <div class="guide-arrow" id="guideArrow">⬇</div>
    <!-- 剧情弹窗 -->
    <div class="story-modal" id="storyModal">
        <div class="story-content">
            <div class="story-header">
                <div>
                    <div class="story-chapter" id="storyChapter">第一章 入学</div>
                    <div class="story-title" id="storyTitle">剧情标题</div>
                </div>
                <button class="story-close" id="storyClose">×</button>
            </div>
            <div class="story-body" id="storyBody">
                <!-- 剧情内容 -->
            </div>
            <div class="story-choices" id="storyChoices">
                <!-- 选项按钮 -->
            </div>
        </div>
    </div>
    <!-- 浮动提示容器 -->
    <div class="toast-container" id="toastContainer"></div>
    <!-- 顶部标题 -->
    <div class="header">
        <div class="logo">大学<span>生存</span></div>
        <div class="disclaimer">32周大学生存模拟 | 做出选择，决定未来</div>
    </div>
    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <div class="status-label">周数</div>
            <div class="status-value" id="week">1</div>
        </div>
        <div class="status-item">
            <div class="status-label">学习</div>
            <div class="status-value" id="study">50</div>
        </div>
        <div class="status-item">
            <div class="status-label">健康</div>
            <div class="status-value" id="health">80</div>
        </div>
        <div class="status-item">
            <div class="status-label">快乐</div>
            <div class="status-value" id="happiness">70</div>
        </div>
        <div class="status-item">
            <div class="status-label">金钱</div>
            <div class="status-value" id="money">1000</div>
        </div>
        <div class="status-item">
            <div class="status-label">社交</div>
            <div class="status-value" id="social">40</div>
        </div>
    </div>
    <!-- 核心面板容器 -->
    <div class="panels-container">
        <!-- 左侧游戏区 -->
        <div class="game-area">
            <!-- 行动按钮面板 -->
            <div class="panel actions-panel">
                <button class="action-btn" data-action="study">去图书馆学习</button>
                <button class="action-btn" data-action="rest">宿舍休息</button>
                <button class="action-btn" data-action="play">和朋友打游戏</button>
                <button class="action-btn" data-action="parttime">做兼职</button>
                <button class="action-btn" data-action="socialize">参加社团活动</button>
                <button class="action-btn" data-action="exercise">去健身房</button>
                <button class="action-btn" data-action="skip">跳过本周</button>
            </div>
            <!-- 每日目标面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">每日目标</div>
                    <div class="panel-progress" id="goal-progress">0/5</div>
                </div>
                <div class="status-item">
                    <div class="status-label" id="goal-text">学习提升5点</div>
                    <div class="status-value">奖励: <span id="goal-reward">+10 金钱</span></div>
                </div>
            </div>
            <!-- 日志面板 -->
            <div class="panel log-panel">
                <div class="panel-header">
                    <div class="panel-title">事件日志</div>
                </div>
                <ul class="log-list" id="log-list"></ul>
            </div>
        </div>
        <!-- 右侧信息区 -->
        <div class="info-area">
            <!-- 技能面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">技能</div>
                    <div class="panel-progress" id="skills-progress">0/4</div>
                </div>
                <div class="skills-list" id="skills-list"></div>
            </div>
            <!-- 成就面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">成就</div>
                    <div class="panel-progress" id="achievements-progress">0/5</div>
                </div>
                <div class="achievements-list" id="achievements-list"></div>
            </div>
            <!-- 道具面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">道具</div>
                </div>
                <div class="items-grid" id="items-list"></div>
            </div>
            <!-- 图鉴面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">事件图鉴</div>
                    <div class="panel-progress" id="gallery-progress">0/12</div>
                </div>
                <div class="gallery-grid" id="gallery-list"></div>
            </div>
        </div>
    </div>
    <!-- 结局弹窗（初始隐藏） -->
    <div class="ending-modal hidden" id="endingModal">
        <div class="ending-content">
            <div class="ending-title" id="endingTitle">结局标题</div>
            <div class="ending-stats">
                <div class="ending-stats-grid" id="endingStats"></div>
            </div>
            <div class="ending-desc" id="endingDesc"></div>

        function showGuideStep() {
            if (currentGuideStep >= guideSteps.length) {
                endGuide();
                return;
            }
            
            const step = guideSteps[currentGuideStep];
            const targetEl = document.querySelector(step.target);
            
            if (!targetEl) {
                currentGuideStep++;
                showGuideStep();
                return;
            }
            const rect = targetEl.getBoundingClientRect();
            const highlight = document.getElementById('guideHighlight');
            const tooltip = document.getElementById('guideTooltip');
            const title = document.getElementById('guideTitle');
            const text = document.getElementById('guideText');
            const btn = document.getElementById('guideBtn');
            const overlay = document.getElementById('guideOverlay');
            const arrow = document.getElementById('guideArrow');
            // 设置高亮框
            highlight.style.width = rect.width + 20 + 'px';
            highlight.style.height = rect.height + 20 + 'px';
            highlight.style.left = rect.left - 10 + 'px';
            highlight.style.top = rect.top - 10 + 'px';
            // 设置提示框位置
            let tooltipX, tooltipY;
            const gap = 15;
            
            switch(step.position) {
                case 'bottom':
                    tooltipX = rect.left;
                    tooltipY = rect.bottom + gap;
                    arrow.style.display = 'block';
                    arrow.style.left = rect.left + rect.width/2 - 15 + 'px';
                    arrow.style.top = rect.top - 40 + 'px';
                    arrow.textContent = '⬆';

                    tooltipY = rect.top - 180;

                    arrow.style.left = rect.left + rect.width/2 - 15 + 'px';
                    arrow.style.top = rect.bottom + 5 + 'px';

                    break;

                    arrow.style.left = rect.left - 40 + 'px';
                    arrow.style.top = rect.top + rect.height/2 - 15 + 'px';

                    arrow.style.top = rect.top + rect.height/2 - 15 + 'px';
                    arrow.textContent = '⬅';
                    break;

            tooltip.style.left = Math.max(10, tooltipX) + 'px';

            if (storyData[storyKey]) {
                // 第32周需要特殊处理，检查属性条件
                if (week === 32) {
                    const story = storyData[storyKey];
                    // 检查是否有满足条件的选择
                    const availableChoices = story.choices.filter(choice => {
                        if (!choice.statCheck) return true;
                        for (const [stat, min] of Object.entries(choice.statCheck)) {
                            if (gameState.stats[stat] < min) return false;
                        }
                        return true;
                    });
                    
                    if (availableChoices.length > 0) {
                        triggerStory(storyKey);
                    }
                } else {
                    triggerStory(storyKey);
                }
            }

            choices.innerHTML = '';

            showDialogue();

                currentStory = null;

            modal.classList.add('active');

                    showChoices();
                }
                return;
            }
            
            const dialogue = currentStory.dialogues[currentDialogueIndex];
            
            body.innerHTML = `
                <div class="story-character">
                    <div class="story-avatar">${dialogue.avatar}</div>

            elements.skillsProgress.textContent = `${unlockedCount}/4`;
            
            for (const [key, skill] of Object.entries(skills)) {
                if (!skill.unlocked && skill.condition(gameState.stats)) {
                    skill.unlocked = true;
                    logEvent(`技能解锁: ${skill.name}`, 'event');
                    const buff = skill.buff();
                    const centerX = window.innerWidth/2;
                    const centerY = window.innerHeight/2;
                    for (const [stat, value] of Object.entries(buff)) {
                        adjustStat(stat, value, centerX, centerY, true);
                    }
                }
            }
            elements.skillsList.innerHTML = '';
            for (const [key, skill] of Object.entries(skills)) {
                const skillEl = document.createElement('div');
                skillEl.className = `skill-item ${skill.unlocked ? 'unlocked' : 'locked'}`;
                const buff = skill.buff();
                const buffText = Object.entries(buff).map(([s, v]) => `+${v} ${getStatName(s)}`).join(' ');
                skillEl.innerHTML = `
                    <span>${skill.name}</span>
                    <span class="skill-buff">${skill.unlocked ? buffText : '未解锁'}</span>
                `;
                elements.skillsList.appendChild(skillEl);
            }
            const activeBuffs = {};
            for (const [key, skill] of Object.entries(skills)) {
                if (skill.unlocked) {
                    const buff = skill.buff();
                    for (const [stat, value] of Object.entries(buff)) {
                        activeBuffs[stat] = (activeBuffs[stat] || 0) + value;
                    }
                }
            }
            return activeBuffs;
        }
        // 成就检测
        function checkAchievements() {
            const s = gameState.stats;
            const achievements = [
                { id: 'top-student', name: '学霸本霸', condition: s.study >= 90, reward: { money: 100 }, desc: '学习值≥90' },
                { id: 'social-star', name: '社交明星', condition: s.social >= 90, reward: { happiness: 20 }, desc: '社交值≥90' },
                { id: 'money-free', name: '财富自由', condition: s.money >= 2000, reward: { money: 50 }, desc: '金钱≥2000' },
                { id: 'full-attendance', name: '全勤达人', condition: !gameState.hasSkippedWeek, reward: { health: 10 }, desc: '未使用跳过本周' },
                { id: 'all-round', name: '六边形战士', condition: s.study >= 60 && s.health >= 60 && s.happiness >= 60 && s.social >= 60 && s.money >= 600, reward: { all: 5 }, desc: '所有属性≥60' }
            ];
            for (const ach of achievements) {
                if (ach.condition && !gameState.achievements.includes(ach.id)) {
                    gameState.achievements.push(ach.id);
                    logEvent(`成就解锁: ${ach.name}`, 'reward');
                    const centerX = window.innerWidth/2;
                    const centerY = window.innerHeight/2;
                    if (ach.reward.all) {
                        adjustStat('study', ach.reward.all, centerX, centerY, true);
                        adjustStat('health', ach.reward.all, centerX, centerY, true);
                        adjustStat('happiness', ach.reward.all, centerX, centerY, true);
                        adjustStat('social', ach.reward.all, centerX, centerY, true);
                        adjustStat('money', ach.reward.all, centerX, centerY, true);
                    } else {
                        for (const [stat, value] of Object.entries(ach.reward)) {
                            adjustStat(stat, value, centerX, centerY, true);
                        }
                    }
                }
            }
            elements.achievementsProgress.textContent = `${gameState.achievements.length}/5`;
            elements.achievementsList.innerHTML = '';
            achievements.forEach(ach => {
                const achEl = document.createElement('div');
                achEl.className = `achievement-item ${gameState.achievements.includes(ach.id) ? 'unlocked' : 'locked'}`;
                achEl.innerHTML = `
                    <span>${ach.name}</span>
                    <span class="achievement-reward">${ach.desc}</span>
                `;
                elements.achievementsList.appendChild(achEl);
            });
        }
        // 图鉴面板更新
        function updateGalleryPanel() {
            const gallery = document.getElementById('gallery-list');
            const progress = document.getElementById('gallery-progress');
            const events = gameState.events.list;
            
            gallery.innerHTML = '';
            events.forEach(event => {
                const el = document.createElement('div');
                el.className = `gallery-item ${gameState.gallery.events.includes(event.id) ? 'unlocked' : ''}`;
                el.textContent = event.name;
                gallery.appendChild(el);
            });
            
            progress.textContent = `${gameState.gallery.events.length}/${events.length}`;
        }
        // 道具面板更新
        function updateItemsPanel() {
            const itemsEl = document.getElementById('items-list');
            itemsEl.innerHTML = '';
            
            gameState.items.list.forEach(item => {
                const el = document.createElement('div');
                el.className = `item-card ${item.count > 0 ? '' : 'disabled'}`;
                el.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-count">x${item.count}</div>
                `;
                
                if (item.count > 0) {
                    el.onclick = () => useItem(item);
                }
                
                itemsEl.appendChild(el);
            });
        }
        // 使用道具
        function useItem(item) {
            if (item.count <= 0 || gameState.gameEnded) return;
            
            item.count--;
            const centerX = window.innerWidth/2;
            const centerY = window.innerHeight/2;
            
            for (const [stat, value] of Object.entries(item.effect)) {
                adjustStat(stat, value, centerX, centerY, true);
            }
            
            logEvent(`使用道具: ${item.name}`, 'reward');
            updateItemsPanel();
        }
        // 随机事件触发
        function triggerRandomEvent() {
            if (Math.random() > gameState.items.getProbability) return;
            
            const events = gameState.events.list;
            const event = events[Math.floor(Math.random() * events.length)];
            
            if (!gameState.gallery.events.includes(event.id)) {
                gameState.gallery.events.push(event.id);
                logEvent(`解锁图鉴: ${event.name}`, 'event');
            }
            
            if (Math.random() < event.probability) {
                logEvent(`事件: ${event.desc}`, 'event');
                const centerX = window.innerWidth/2;
                const centerY = window.innerHeight/2;
                
                for (const [stat, value] of Object.entries(event.effect)) {
                    adjustStat(stat, value, centerX, centerY);
                }
            }
        }
        // 随机获得道具
        function randomGetItem() {
            if (Math.random() < gameState.items.getProbability) {
                const items = gameState.items.list;
                const randomItem = items[Math.floor(Math.random() * items.length)];
                randomItem.count++;
                logEvent(`获得道具: ${randomItem.name}`, 'reward');
                updateItemsPanel();
            }
        }
        // 日志记录
        function logEvent(message, type = 'default') {
            const time = new Date().toLocaleTimeString();
            const logEl = document.createElement('li');
            logEl.className = `log-item log-${type}`;
            logEl.innerHTML = `
                <span class="log-time">[${time}]</span>
                <span class="log-text">${message}</span>
            `;
            elements.logList.appendChild(logEl);
            elements.logList.scrollTop = elements.logList.scrollHeight;
        }
        // 调整属性值
        function adjustStat(stat, value, eventX, eventY, isReward = false) {
            if (gameState.gameEnded) return 0;
            
            const oldValue = gameState.stats[stat];
            const activeBuffs = checkSkills();
            
            let actualValue = value;
            if (value > 0 && activeBuffs[stat]) {
                actualValue += activeBuffs[stat];
            }
            
            // 属性瓶颈
            if (oldValue >= gameState.statBottleneck && actualValue > 0) {
                actualValue = Math.floor(actualValue / 2);
                if (actualValue < 1) actualValue = 1;
            }
            
            // 属性联动惩罚
            let penalty = 0;
            if (stat === 'health' && oldValue < 30 && value < 0) {
                penalty = -2;
            } else if (stat === 'happiness' && oldValue < 20) {
                penalty = -1;
            }
            actualValue += penalty;
            
            if (penalty < 0) {
                logEvent(`惩罚: ${getStatName(stat)}过低，额外扣减${-penalty}点`, 'warning');
            }
            
            // 最终属性调整
            if (stat === 'money') {
                gameState.stats[stat] = Math.max(0, oldValue + actualValue);
            } else {
                gameState.stats[stat] = Math.max(0, Math.min(100, oldValue + actualValue));
            }
            
            const finalValue = gameState.stats[stat] - oldValue;
            if (finalValue !== 0) {
                showStatToast(stat, finalValue, eventX, eventY, isReward);
                if (stat === gameState.dailyGoal.type && finalValue > 0) {
                    gameState.dailyGoal.progress += finalValue;
                    checkDailyGoal();
                }
            }
            
            return finalValue;
        }
        // 检查每日目标
        function checkDailyGoal() {
            if (gameState.dailyGoal.progress >= gameState.dailyGoal.target) {
                const rewardStat = ['study', 'health', 'happiness', 'social'][Math.floor(Math.random() * 4)];
                const rewardValue = Math.floor(Math.random() * 5) + 1;
                
                gameState.stats.money += gameState.dailyGoal.reward.money;
                gameState.stats[rewardStat] = Math.max(0, Math.min(100, gameState.stats[rewardStat] + rewardValue));
                
                logEvent(`目标完成: 获得奖励 +${gameState.dailyGoal.reward.money} 金钱 +${rewardValue} ${getStatName(rewardStat)}`, 'reward');
                showStatToast(rewardStat, rewardValue, window.innerWidth/2, window.innerHeight/2, true);
                
                resetDailyGoal();
            }
        }
        // 重置每日目标
        function resetDailyGoal() {
            const stats = ['study', 'health', 'happiness', 'social'];
            const randomStat = stats[Math.floor(Math.random() * stats.length)];
            const baseTarget = Math.floor(Math.random() * 8) + 3;
            const difficultyBoost = Math.min(Math.floor(gameState.week / 4), 5);
            const randomTarget = baseTarget + difficultyBoost;
            const rewardMoney = Math.floor(Math.random() * 15) + 10 + difficultyBoost * 2;
            
            gameState.dailyGoal = {
                type: randomStat,
                target: randomTarget,
                progress: 0,
                reward: { money: rewardMoney }
            };
            
            elements.goalText.textContent = `${getStatName(randomStat)}提升${randomTarget}点`;
            elements.goalReward.textContent = `+${rewardMoney} 金钱`;
            elements.goalProgress.textContent = `0/${randomTarget}`;
        }
        // 处理每周事件
        function handleWeeklyEvents() {
            // 80%概率触发随机事件
            if (Math.random() < 0.8) {
                triggerRandomEvent();
            }
            // 20%概率获得道具
            randomGetItem();
        }
        // 检查游戏结束
        function checkGameEnd() {
            const s = gameState.stats;
            
            // 检查属性过低
            if (s.health <= 0) {
                showEnding('unhealthy', '健康值为0，被迫退学！');
                return true;
            }
            if (s.happiness <= 0) {
                showEnding('lazy', '快乐值为0，抑郁退学！');
                return true;
            }
            if (s.money < 0) {
                showEnding('failed', '金钱为负，被迫退学！');
                return true;
            }
            
            // 第32周结束
            if (gameState.week > 32) {
                // 根据属性决定结局
                if (s.study >= 80) {
                    showEnding('scholar', '成功保研！成为学霸！');
                } else if (s.social >= 80) {
                    showEnding('social', '社交达人！人脉广泛！');
                } else if (s.health >= 80) {
                    showEnding('healthy', '身体倍棒！精力充沛！');
                } else if (s.money >= 1500) {
                    showEnding('rich', '创业成功！财务自由！');
                } else if (s.study < 30 && s.social < 30) {
                    showEnding('lazy', '彻底躺平！快乐无边！');
                } else if (s.study >= 60 && s.health >= 60 && s.happiness >= 60 && s.social >= 60 && s.money >= 600) {
                    showEnding('balanced', '全面发展！人生赢家！');
                } else {
                    showEnding('normal', '平淡毕业，前路漫长！');
                }
                return true;
            }
            
            return false;
        }
        // 显示结局
        function showEnding(type, desc) {
            gameState.gameEnded = true;
            
            const endings = {
                scholar: { title: '保研学霸', desc: '你以优异的成绩获得保研资格，继续深造！' },
                social: { title: '社交达人', desc: '你拥有广泛的人脉，成为社交圈的核心人物！' },
                healthy: { title: '健身教练', desc: '你保持了强健的体魄，甚至可以考虑当健身教练！' },
                rich: { title: '创业新贵', desc: '你积累了丰厚的财富，成为年轻有为的企业家！' },
                lazy: { title: '躺平大师', desc: '你选择了轻松的生活方式，享受当下的快乐！' },
                unhealthy: { title: '退学', desc: '健康是最重要的，希望你好好休养...' },
                failed: { title: '经济困难', desc: '经济问题导致了学业中断，这是一个艰难的教训...' },
                balanced: { title: '人生赢家', desc: '你全面发展，是同学眼中的六边形战士！' },
                normal: { title: '普通毕业', desc: '你完成了大学学业，前方还有更长的路要走。' }
            };
            
            const ending = endings[type] || endings.normal;
            
            document.getElementById('endingTitle').textContent = ending.title;
            document.getElementById('endingDesc').textContent = ending.desc;
            
            const statsGrid = document.getElementById('endingStats');
            const stats = gameState.stats;
            statsGrid.innerHTML = `
                <div class="ending-stat-item">学习: ${stats.study}</div>
                <div class="ending-stat-item">健康: ${stats.health}</div>
                <div class="ending-stat-item">快乐: ${stats.happiness}</div>
                <div class="ending-stat-item">金钱: ${stats.money}</div>
                <div class="ending-stat-item">社交: ${stats.social}</div>
                <div class="ending-stat-item">成就: ${gameState.achievements.length}/5</div>
            `;
            
            document.getElementById('endingModal').classList.remove('hidden');
            
            // 重新开始按钮
            document.querySelector('.restart-btn').addEventListener('click', () => {
                location.reload();
            });
        }
        // 更新UI
        function updateUI() {
            elements.week.textContent = gameState.week;
            elements.study.textContent = gameState.stats.study;
            elements.health.textContent = gameState.stats.health;
            elements.happiness.textContent = gameState.stats.happiness;
            elements.money.textContent = gameState.stats.money;
            elements.social.textContent = gameState.stats.social;
            elements.goalProgress.textContent = `${gameState.dailyGoal.progress}/${gameState.dailyGoal.target}`;
            
            checkStatBottleneck();
            checkSkills();
            checkAchievements();
            updateGalleryPanel();
            updateItemsPanel();
        }
        // 处理行动按钮点击
        function handleAction(action, event) {
            // 引导期间禁止操作
            if (isGuideActive) return;
            
            if (gameState.gameEnded) return;
            
            const x = event.clientX;
            const y = event.clientY;
            
            switch(action) {
                case 'study':
                    logEvent('行动: 去图书馆学习', 'event');
                    adjustStat('study', 10, x, y);
                    adjustStat('health', -2, x, y);
                    adjustStat('happiness', -3, x, y);
                    break;
                case 'rest':
                    logEvent('行动: 宿舍休息', 'event');
                    adjustStat('health', 8, x, y);
                    adjustStat('happiness', 5, x, y);
                    adjustStat('study', -1, x, y);
                    break;
                case 'play':
                    logEvent('行动: 和朋友打游戏', 'event');
                    adjustStat('happiness', 12, x, y);
                    adjustStat('study', -5, x, y);
                    adjustStat('health', -1, x, y);
                    adjustStat('social', 3, x, y);
                    break;
                case 'parttime':
                    logEvent('行动: 做兼职', 'event');
                    adjustStat('money', 50, x, y);
                    adjustStat('study', -4, x, y);
                    adjustStat('health', -3, x, y);
                    adjustStat('happiness', -2, x, y);
                    break;
                case 'socialize':
                    logEvent('行动: 参加社团活动', 'event');
                    adjustStat('social', 15, x, y);
                    adjustStat('happiness', 8, x, y);
                    adjustStat('study', -3, x, y);
                    adjustStat('health', -1, x, y);
                    break;
                case 'exercise':
                    logEvent('行动: 去健身房', 'event');
                    adjustStat('health', 10, x, y);
                    adjustStat('happiness', 5, x, y);
                    adjustStat('money', -20, x, y);
                    break;
                case 'skip':
                    logEvent('行动: 跳过本周', 'warning');
                    gameState.hasSkippedWeek = true;
                    break;
            }
            
            // 推进周数
            gameState.week++;
            logEvent(`第${gameState.week-1}周结束，进入第${gameState.week}周`, 'default');
            
            // 处理每周事件
            handleWeeklyEvents();
            
            // 检查主线剧情触发
            checkStoryTrigger();
            
            // 检查游戏结束
            if (!checkGameEnd()) {
                updateUI();
            }
        }
        // 初始化游戏
        function initGame() {
            // 绑定行动按钮事件
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const action = btn.dataset.action;
                    handleAction(action, e);
                });
            });
            
            // 初始化面板
            resetDailyGoal();
            updateUI();
            logEvent('游戏开始！祝你在大学生存32周', 'default');
            
            // 启动新手引导
            setTimeout(() => {
                startGuide();
            }, 500);
        }
        // 启动游戏
        initGame();
    </script>
</body>
</html>
