<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大一生活模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .game-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #f0f0f0;
        }

        .week-info {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ccc;
        }

        .scene-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .scene-btn {
            padding: 25px 10px;
            font-size: 1.2rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
            min-height: 100px;
        }

        .scene-btn:hover {
            background-color: #444;
        }

        .event-container {
            display: none;
            background-color: #222;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        .event-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #f0f0f0;
        }

        .event-option-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-option-btn {
            padding: 20px 10px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .event-option-btn:hover {
            background-color: #444;
        }

        .stats-container {
            margin-top: 40px;
        }

        .stat-item {
            margin-bottom: 20px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .stat-bar {
            width: 100%;
            height: 20px;
            background-color: #2d2d2d;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-progress {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .gpa { background-color: #4a90e2; }
        .social { background-color: #7ed321; }
        .health { background-color: #ff5a5f; }
        .money { background-color: #f5a623; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: #222;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .option-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            padding: 20px 10px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-btn:hover {
            background-color: #444;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.9);
            padding: 25px 40px;
            border-radius: 8px;
            font-size: 1.3rem;
            z-index: 1001;
            display: none;
            text-align: center;
        }

        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }

        .ending-content {
            background-color: #222;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .ending-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .ending-desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
            line-height: 1.6;
        }

        .ending-stats {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #eee;
        }

        .restart-btn {
            padding: 18px 30px;
            font-size: 1.2rem;
            background-color: #4a90e2;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

        <button class="scene-btn" data-scene="library">图书馆</button>
        <button class="scene-btn" data-scene="canteen">食堂</button>
        <button class="scene-btn" data-scene="playground">操场</button>

    <div class="stats-container">
        <div class="stat-item">
            <div class="stat-label"><span>绩点</span><span id="gpaValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress gpa" id="gpaBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>社交</span><span id="socialValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress social" id="socialBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>健康</span><span id="healthValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress health" id="healthBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>金钱</span><span id="moneyValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress money" id="moneyBar" style="width:50%"></div></div>
        </div>
    </div>

    <div class="modal hidden" id="sceneModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="option-buttons" id="optionButtons"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ending-modal" id="endingModal">
        <div class="ending-content">
            <h2 class="ending-title" id="endingTitle"></h2>
            <p class="ending-desc" id="endingDesc"></p>
            <div class="ending-stats" id="endingStats"></div>
            <button class="restart-btn" id="restartBtn">重新开始大学</button>

    function initGame() {
        const saved = localStorage.getItem('freshmanSimData');
        if (saved) gameData = JSON.parse(saved);
        updateUI();
        checkEnding();
        checkRandomEvent();
    }

    function checkRandomEvent() {
        sceneButtonsContainer.style.display = 'grid';
        eventContainer.style.display = 'none';
        if (Math.random() <= 0.3) {
            const evt = eventLibrary[Math.floor(Math.random() * eventLibrary.length)];
            showRandomEvent(evt);
        }
    }

    function showRandomEvent(evt) {
        sceneButtonsContainer.style.display = 'none';
        eventContainer.style.display = 'block';
        eventTitle.textContent = evt.title;
        eventOptionButtons.innerHTML = '';
        evt.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'event-option-btn';
            b.textContent = `${i+1}. ${opt.text}`;
            b.onclick = () => {
                applyStatChanges(opt.changes);
                nextWeek();
            };
            eventOptionButtons.appendChild(b);
        });
    }

    function applyStatChanges(changes) {
        for (let s in changes) {
            gameData.stats[s] = Math.max(0, Math.min(100, gameData.stats[s] + (changes[s] || 0)));
        }
        saveGame();
    }

    function nextWeek() {
        gameData.week++;
        showToast(`第${gameData.week - 1}周结束`);
        updateUI();
        const ended = checkEnding();
        if (!ended) checkRandomEvent();
    }

    function updateUI() {
        weekDisplay.textContent = `第${gameData.week}周`;
        for (let s in gameData.stats) {
            statElements[s].value.textContent = gameData.stats[s];
            statElements[s].bar.style.width = gameData.stats[s] + '%';
        }
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('freshmanSimData', JSON.stringify(gameData));
    }

    function openSceneModal(key) {
        const sc = sceneConfig[key];
        modalTitle.textContent = sc.name;
        optionButtons.innerHTML = '';
        sc.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.textContent = `${i+1}. ${opt.text}`;
            b.onclick = () => {
                applyStatChanges(opt.changes);
                sceneModal.classList.add('hidden');
                nextWeek();
            };
            optionButtons.appendChild(b);
        });
        sceneModal.classList.remove('hidden');
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

// 2.0新增：随机事件触发函数
function triggerRandomEvent() {
  // 30%概率触发随机事件
  if (Math.random() < 0.3) {
    const randomIndex = Math.floor(Math.random() * events.length);
    const event = events[randomIndex];
    // 弹出事件弹窗（复用1.0的弹窗逻辑）
    showDialog(event.desc, event.options.map(opt => {
      return () => {
        changeAttr('grade', opt.attr.grade || 0);
        changeAttr('social', opt.attr.social || 0);
        changeAttr('health', opt.attr.health || 0);
        changeAttr('money', opt.attr.money || 0);
        week++; // 周数+1
        updateUI(); // 更新属性UI
      };
    }));
    return true; // 触发了事件
  }
  return false; // 未触发事件，显示正常场景
};

// 每周开始时
function startWeek() {
  if (!triggerRandomEvent()) {
    // 没触发事件，显示正常场景选择
    showScenes();
  }
}

    // ———— 结局系统 ————
    function checkEnding() {
        if (gameData.week < 17) return false;

        let gpa = gameData.stats.gpa;
        let social = gameData.stats.social;
        let money = gameData.stats.money;
        let health = gameData.stats.health;

        let title, desc;

        if (gpa > 80) {
            title = "🎉 保研预备役";
            desc = "大一就打下了坚实基础，保研稳了！";
        } else if (social > 80) {
            title = "🌟 社团风云人物";
            desc = "人脉拉满，校园里无人不识！";
        } else if (money > 80) {
            title = "💸 兼职小老板";
            desc = "经济独立，大学生活自由又滋润！";
        } else if (gpa < 20) {
            title = "⚠️ 留级警告";
            desc = "学业严重亮起红灯，再不努力就要留级了！";
        } else if (health < 10) {
            title = "🤒 体测危机";
            desc = "身体被掏空，体测根本过不了！";
        } else {
            title = "📚 平凡大学生";
            desc = "平平淡淡才是真，平安度过大一。";
        }

        endingTitle.textContent = title;
        endingDesc.textContent = desc;
        endingStats.innerHTML = `
            绩点：${gpa}<br>
            社交：${social}<br>
            健康：${health}<br>
            金钱：${money}
        `;
        endingModal.style.display = 'flex';
        return true;
    }

    function resetGame() {
        gameData = { week: 1, stats: { gpa:50, social:50, health:50, money:50 } };
        saveGame();
        endingModal.style.display = 'none';
        updateUI();
        checkRandomEvent();
    }

    restartBtn.onclick = resetGame;

    document.querySelectorAll('.scene-btn').forEach(b => {
        b.onclick = () => openSceneModal(b.dataset.scene);
    });

    sceneModal.onclick = e => {
        if (e.target === sceneModal) sceneModal.classList.add('hidden');
    };

    initGame();
</script>
