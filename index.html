<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大一生活模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            color: #fff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .game-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: #f0f0f0;
        }

        .week-info {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #ccc;
        }

        .scene-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .scene-btn {
            padding: 25px 10px;
            font-size: 1.2rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
            min-height: 100px;
        }

        .scene-btn:hover {
            background-color: #444;
        }

        .event-container {
            display: none;
            background-color: #222;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        .event-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #f0f0f0;
        }

        .event-option-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .event-option-btn {
            padding: 20px 10px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .event-option-btn:hover {
            background-color: #444;
        }

        .stats-container {
            margin-top: 40px;
        }

        .stat-item {
            margin-bottom: 20px;
        }

        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .stat-bar {
            width: 100%;
            height: 20px;
            background-color: #2d2d2d;
            border-radius: 10px;
            overflow: hidden;
        }

        .stat-progress {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .gpa { background-color: #4a90e2; }
        .social { background-color: #7ed321; }
        .health { background-color: #ff5a5f; }
        .money { background-color: #f5a623; }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: #222;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .option-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            padding: 20px 10px;
            font-size: 1.1rem;
            background-color: #333;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .option-btn:hover {
            background-color: #444;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.9);
            padding: 25px 40px;
            border-radius: 8px;
            font-size: 1.3rem;
            z-index: 1001;
            display: none;
            text-align: center;
        }

        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
        }

        .ending-content {
            background-color: #222;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .ending-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
        }

        .ending-desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #ccc;
            line-height: 1.6;
        }

        .ending-stats {
            margin: 20px 0;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #eee;
        }

        .restart-btn {
            padding: 18px 30px;
            font-size: 1.2rem;
            background-color: #4a90e2;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <h1 class="game-title">大一生活模拟器</h1>
    <div class="week-info" id="weekDisplay">第1周</div>

    <div class="event-container" id="eventContainer">
        <h2 class="event-title" id="eventTitle"></h2>
        <div class="event-option-buttons" id="eventOptionButtons"></div>
    </div>

    <div class="scene-buttons" id="sceneButtonsContainer">
        <button class="scene-btn" data-scene="dorm">宿舍</button>
        <button class="scene-btn" data-scene="library">图书馆</button>
        <button class="scene-btn" data-scene="canteen">食堂</button>
        <button class="scene-btn" data-scene="playground">操场</button>
        <button class="scene-btn" data-scene="club">社团</button>
        <button class="scene-btn" data-scene="parttime">兼职</button>
    </div>

    <div class="stats-container">
        <div class="stat-item">
            <div class="stat-label"><span>绩点</span><span id="gpaValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress gpa" id="gpaBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>社交</span><span id="socialValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress social" id="socialBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>健康</span><span id="healthValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress health" id="healthBar" style="width:50%"></div></div>
        </div>
        <div class="stat-item">
            <div class="stat-label"><span>金钱</span><span id="moneyValue">50</span></div>
            <div class="stat-bar"><div class="stat-progress money" id="moneyBar" style="width:50%"></div></div>
        </div>
    </div>

    <div class="modal hidden" id="sceneModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="option-buttons" id="optionButtons"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="ending-modal" id="endingModal">
        <div class="ending-content">
            <h2 class="ending-title" id="endingTitle"></h2>
            <p class="ending-desc" id="endingDesc"></p>
            <div class="ending-stats" id="endingStats"></div>
            <button class="restart-btn" id="restartBtn">重新开始大学</button>
        </div>
    </div>

<script>
    let gameData = {
        week: 1,
        stats: { gpa: 50, social: 50, health: 50, money: 50 }
    };

    const sceneConfig = {
        dorm: {
            name: "宿舍",
            options: [
                { text: "打游戏", changes: { gpa: -5, social: +5, health: -3, money: 0 } },
                { text: "睡觉", changes: { gpa: 0, social: -2, health: +10, money: 0 } },
                { text: "追剧", changes: { gpa: -3, social: +2, health: -1, money: 0 } }
            ]
        },
        library: {
            name: "图书馆",
            options: [
                { text: "刷题", changes: { gpa: +10, social: -5, health: -2, money: 0 } },
                { text: "发呆", changes: { gpa: 0, social: 0, health: 0, money: 0 } },
                { text: "占座", changes: { gpa: +2, social: -3, health: -1, money: 0 } }
            ]
        },
        canteen: {
            name: "食堂",
            options: [
                { text: "吃大餐", changes: { gpa: 0, social: +3, health: +5, money: -10 } },
                { text: "吃泡面", changes: { gpa: 0, social: 0, health: -2, money: -2 } },
                { text: "蹭饭", changes: { gpa: 0, social: +8, health: +3, money: 0 } }
            ]
        },
        playground: {
            name: "操场",
            options: [
                { text: "跑步", changes: { gpa: 0, social: 0, health: +10, money: 0 } },
                { text: "打球", changes: { gpa: 0, social: +8, health: +5, money: 0 } },
                { text: "散步", changes: { gpa: 0, social: +3, health: +3, money: 0 } }
            ]
        },
        club: {
            name: "社团",
            options: [
                { text: "参加活动", changes: { gpa: -3, social: +10, health: -1, money: -5 } },
                { text: "当干事", changes: { gpa: -5, social: +8, health: -3, money: 0 } },
                { text: "摸鱼", changes: { gpa: 0, social: +2, health: 0, money: 0 } }
            ]
        },
        parttime: {
            name: "兼职",
            options: [
                { text: "发传单", changes: { gpa: 0, social: +2, health: -5, money: +20 } },
                { text: "家教", changes: { gpa: +5, social: +3, health: -3, money: +50 } },
                { text: "奶茶店打工", changes: { gpa: -2, social: +5, health: -4, money: +30 } }
            ]
        }
    };

    const eventLibrary = [
        {
            title: "随机事件：捡到100元",
            options: [
                { text: "上交辅导员", changes: { gpa: +5, social: +3, money: 0 } },
                { text: "自己留着花", changes: { gpa: -3, money: +100 } },
                { text: "请室友喝奶茶", changes: { social: +10, money: -50 } }
            ]
        },
        {
            title: "随机事件：感冒了",
            options: [
                { text: "硬扛上课", changes: { gpa: +2, health: -10 } },
                { text: "请假休息", changes: { gpa: -5, health: +5 } },
                { text: "买药吃", changes: { health: +3, money: -15 } }
            ]
        },
        {
            title: "随机事件：收到表白",
            options: [
                { text: "答应对方", changes: { gpa: -8, social: +15, health: +2, money: -20 } },
                { text: "委婉拒绝", changes: { social: -5 } },
                { text: "假装没看见", changes: { gpa: +2, social: -8 } }
            ]
        },
        {
            title: "随机事件：考试临近",
            options: [
                { text: "通宵复习", changes: { gpa: +15, health: -10 } },
                { text: "佛系摆烂", changes: { gpa: -10, social: +5 } },
                { text: "抱学霸大腿", changes: { gpa: +8, social: +8, money: -10 } }
            ]
        },
        {
            title: "随机事件：宿舍查寝",
            options: [
                { text: "提前收拾", changes: { social: +5 } },
                { text: "假装不在", changes: { social: -3 } },
                { text: "贿赂舍长", changes: { social: +3, money: -20 } }
            ]
        }
    ];

    const sceneModal = document.getElementById('sceneModal');
    const modalTitle = document.getElementById('modalTitle');
    const optionButtons = document.getElementById('optionButtons');
    const weekDisplay = document.getElementById('weekDisplay');
    const toast = document.getElementById('toast');
    const sceneButtonsContainer = document.getElementById('sceneButtonsContainer');
    const eventContainer = document.getElementById('eventContainer');
    const eventTitle = document.getElementById('eventTitle');
    const eventOptionButtons = document.getElementById('eventOptionButtons');
    const endingModal = document.getElementById('endingModal');
    const endingTitle = document.getElementById('endingTitle');
    const endingDesc = document.getElementById('endingDesc');
    const endingStats = document.getElementById('endingStats');
    const restartBtn = document.getElementById('restartBtn');

    const statElements = {
        gpa: { bar: document.getElementById('gpaBar'), value: document.getElementById('gpaValue') },
        social: { bar: document.getElementById('socialBar'), value: document.getElementById('socialValue') },
        health: { bar: document.getElementById('healthBar'), value: document.getElementById('healthValue') },
        money: { bar: document.getElementById('moneyBar'), value: document.getElementById('moneyValue') }
    };

    function initGame() {
        const saved = localStorage.getItem('freshmanSimData');
        if (saved) gameData = JSON.parse(saved);
        updateUI();
        checkEnding();
        checkRandomEvent();
    }

    function checkRandomEvent() {
        sceneButtonsContainer.style.display = 'grid';
        eventContainer.style.display = 'none';
        if (Math.random() <= 0.3) {
            const evt = eventLibrary[Math.floor(Math.random() * eventLibrary.length)];
            showRandomEvent(evt);
        }
    }

    function showRandomEvent(evt) {
        sceneButtonsContainer.style.display = 'none';
        eventContainer.style.display = 'block';
        eventTitle.textContent = evt.title;
        eventOptionButtons.innerHTML = '';
        evt.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'event-option-btn';
            b.textContent = `${i+1}. ${opt.text}`;
            b.onclick = () => {
                applyStatChanges(opt.changes);
                nextWeek();
            };
            eventOptionButtons.appendChild(b);
        });
    }

    function applyStatChanges(changes) {
        for (let s in changes) {
            gameData.stats[s] = Math.max(0, Math.min(100, gameData.stats[s] + (changes[s] || 0)));
        }
        saveGame();
    }

    function nextWeek() {
        gameData.week++;
        showToast(`第${gameData.week - 1}周结束`);
        updateUI();
        const ended = checkEnding();
        if (!ended) checkRandomEvent();
    }

    function updateUI() {
        weekDisplay.textContent = `第${gameData.week}周`;
        for (let s in gameData.stats) {
            statElements[s].value.textContent = gameData.stats[s];
            statElements[s].bar.style.width = gameData.stats[s] + '%';
        }
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('freshmanSimData', JSON.stringify(gameData));
    }

    function openSceneModal(key) {
        const sc = sceneConfig[key];
        modalTitle.textContent = sc.name;
        optionButtons.innerHTML = '';
        sc.options.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.textContent = `${i+1}. ${opt.text}`;
            b.onclick = () => {
                applyStatChanges(opt.changes);
                sceneModal.classList.add('hidden');
                nextWeek();
            };
            optionButtons.appendChild(b);
        });
        sceneModal.classList.remove('hidden');
    }

    function showToast(msg) {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    // ———— 结局系统 ————
    function checkEnding() {
        if (gameData.week < 17) return false;

        let gpa = gameData.stats.gpa;
        let social = gameData.stats.social;
        let money = gameData.stats.money;
        let health = gameData.stats.health;

        let title, desc;

        if (gpa > 80) {
            title = "🎉 保研预备役";
            desc = "大一就打下了坚实基础，保研稳了！";
        } else if (social > 80) {
            title = "🌟 社团风云人物";
            desc = "人脉拉满，校园里无人不识！";
        } else if (money > 80) {
            title = "💸 兼职小老板";
            desc = "经济独立，大学生活自由又滋润！";
        } else if (gpa < 20) {
            title = "⚠️ 留级警告";
            desc = "学业严重亮起红灯，再不努力就要留级了！";
        } else if (health < 10) {
            title = "🤒 体测危机";
            desc = "身体被掏空，体测根本过不了！";
        } else {
            title = "📚 平凡大学生";
            desc = "平平淡淡才是真，平安度过大一。";
        }

        endingTitle.textContent = title;
        endingDesc.textContent = desc;
        endingStats.innerHTML = `
            绩点：${gpa}<br>
            社交：${social}<br>
            健康：${health}<br>
            金钱：${money}
        `;
        endingModal.style.display = 'flex';
        return true;
    }

    function resetGame() {
        gameData = { week: 1, stats: { gpa:50, social:50, health:50, money:50 } };
        saveGame();
        endingModal.style.display = 'none';
        updateUI();
        checkRandomEvent();
    }

    restartBtn.onclick = resetGame;

    document.querySelectorAll('.scene-btn').forEach(b => {
        b.onclick = () => openSceneModal(b.dataset.scene);
    });

    sceneModal.onclick = e => {
        if (e.target === sceneModal) sceneModal.classList.add('hidden');
    };

    initGame();
</script>
</body>
</html>
