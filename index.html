<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生存 | 大一上学期模拟</title>
    <style>
        /* 核心风格：暗黑科技风 + 沉浸式叙事 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: #0a0a0a;
            color: #00ff9d;
            min-height: 100vh;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 157, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }
        
        /* ============ 新手引导样式 ============ */
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            display: none;
            pointer-events: auto;
        }
        .guide-overlay.active { display: block; }
        
        .guide-highlight {
            position: fixed;
            z-index: 9999;
            border: 3px solid #00ff9d;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1);
            pointer-events: none;
            animation: guidePulse 1.5s infinite;
            display: none;
        }
        @keyframes guidePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.8), inset 0 0 50px rgba(0, 255, 157, 0.2); }
        }
        
        .guide-tooltip {
            position: fixed;
            z-index: 10000;
            background: rgba(0, 20, 10, 0.95);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 20px;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.3);
            display: none;
            pointer-events: auto !important;
        }
        .guide-tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .guide-tooltip-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.9);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .guide-tooltip-btn {
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            pointer-events: auto !important;
            z-index: 10001;
        }
        .guide-tooltip-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        .guide-arrow {
            position: fixed;
            z-index: 9999;
            font-size: 40px;
            color: #00ff9d;
            animation: guideBounce 1s infinite;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
            display: none;
        }
        @keyframes guideBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ============ 剧情弹窗样式 ============ */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .story-modal.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .story-content {
            max-width: 600px;
            width: 90%;
            background: rgba(0, 20, 10, 0.9);
            border: 2px solid #00ff9d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 255, 157, 0.2);
        }
        .story-header {
            background: rgba(0, 40, 20, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .story-chapter {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .story-title {
            font-size: 20px;
            font-weight: bold;
            color: #00ff9d;
            letter-spacing: 1px;
        }
        .story-body {
            padding: 25px;
        }
        .story-character {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .story-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.2);
            border: 2px solid #00ff9d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .story-dialogue {
            flex: 1;
        }
        .story-name {
            font-size: 14px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 5px;
        }
        .story-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
        }
        .story-choices {
            padding: 20px;
            background: rgba(0, 10, 5, 0.5);
            border-top: 1px solid rgba(0, 255, 157, 0.2);
        }
        .story-choice {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 6px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
        }
        .story-choice:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            transform: translateX(5px);
        }
        .story-choice:last-child { margin-bottom: 0; }
        .story-close {
            background: none;
            border: none;
            color: rgba(0, 255, 157, 0.6);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .story-close:hover { color: #00ff9d; }
        
        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            font-weight: bold;
        }
        .logo span { color: #ff4757; }
        .disclaimer {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            max-width: 300px;
        }
        /* 状态面板（替代原stats） */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .status-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .status-label {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(0, 255, 157, 0.7);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .status-value {
            font-size: 22px;
            font-weight: bold;
            color: #00ff9d;
        }
        .status-value.highlight { color: #ff4757; } /* 瓶颈高亮 */
        /* 核心面板容器 */
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }
        /* 左侧游戏区 */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 面板通用样式 */
        .panel {
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
        }
        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff9d;
        }
        .panel-progress {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.7);
        }
        /* 行动按钮区 */
        .actions-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .action-btn {
            padding: 12px 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 4px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            background: rgba(30, 30, 30, 0.5);
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.3);
            cursor: not-allowed;
            transform: none;
        }
        /* 日志面板 - 重点优化部分 */
        .log-panel {
            height: 280px;
            overflow-y: auto;
            position: relative;
            background: rgba(0, 10, 5, 0.8);
            border: 1px solid rgba(0, 255, 157, 0.4);
        }
        .log-panel::-webkit-scrollbar { width: 6px; }
        .log-panel::-webkit-scrollbar-track { background: rgba(0, 30, 15, 0.5); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 157, 0.6); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb:hover { background: #00ff9d; }
        .log-list { list-style: none; padding: 5px 0; }
        .log-item {
            font-size: 14px;
            padding: 10px 15px;
            margin: 4px 0;
            border-radius: 4px;
            border-left: 3px solid transparent;
            transition: background 0.2s;
        }
        .log-item.log-default { color: #00ff9d; background: rgba(0, 30, 15, 0.3); border-left-color: #00ff9d; }
        .log-item.log-event { color: #66ccff; background: rgba(0, 40, 60, 0.3); border-left-color: #66ccff; }
        .log-item.log-warning { color: #ff9966; background: rgba(60, 30, 0, 0.3); border-left-color: #ff9966; }
        .log-item.log-reward { color: #ffd166; background: rgba(60, 50, 0, 0.3); border-left-color: #ffd166; }
        .log-item.log-story { color: #ff79c6; background: rgba(40, 0, 30, 0.3); border-left-color: #ff79c6; }
        .log-time {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.5);
            margin-right: 8px;
        }
        /* 右侧信息区 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .skills-list, .achievements-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .skill-item, .achievement-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .skill-item.unlocked, .achievement-item.unlocked { color: #00ff9d; }
        .skill-item.locked, .achievement-item.locked { color: rgba(0, 255, 157, 0.4); }
        .skill-buff, .achievement-reward {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.6);
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .item-card {
            padding: 10px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .item-card:hover {
            background: rgba(0, 40, 20, 0.8);
            border-color: #00ff9d;
        }
        .item-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .item-name { font-size: 12px; color: #00ff9d; margin-bottom: 5px; }
        .item-count { font-size: 10px; color: rgba(0, 255, 157, 0.6); }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .gallery-item {
            padding: 8px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            opacity: 0.5;
            transition: all 0.3s;
        }
        .gallery-item.unlocked { opacity: 1; border-color: #00ff9d; }
        /* 浮动提示容器（固定位置） */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .stat-toast {
            padding: 8px 15px;
            border-radius: 4px;
            color: #0a0a0a;
            font-weight: bold;
            animation: fadeInUp 0.3s, fadeOut 1.5s 1s forwards;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 120px;
            text-align: center;
        }
        .stat-toast.stat-plus { background: #00ff9d; border: 1px solid #00cc7a; }
        .stat-toast.stat-minus { background: #ff4757; border-color: #e03545; color: white; }
        .stat-toast.stat-reward { background: #ffd166; border-color: #ffc107; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        /* 结局弹窗（科技风全屏） */
        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.5s;
            padding: 20px;
            display: none;
        }
        .ending-modal.active { display: flex; }
        .ending-content {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.1);
        }
        .ending-title {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            padding-bottom: 15px;
        }
        .ending-stats {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .ending-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .ending-stat-item {
            font-size: 14px;
            padding: 10px;
            background: rgba(0, 20, 10, 0.5);
            border-radius: 4px;
        }
        .ending-desc {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(0, 255, 157, 0.9);
            margin: 20px 0;
        }
        .restart-btn {
            padding: 15px 40px;
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .restart-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        .hidden { display: none !important; }
        /* 响应式 */
        @media (max-width: 800px) {
            .panels-container { grid-template-columns: 1fr; }
            .info-area { order: -1; }
            .status-panel { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 新手引导元素 -->
    <div class="guide-overlay" id="guideOverlay"></div>
    <div class="guide-highlight" id="guideHighlight"></div>
    <div class="guide-tooltip" id="guideTooltip">
        <div class="guide-tooltip-title" id="guideTitle">引导标题</div>
        <div class="guide-tooltip-text" id="guideText">引导内容</div>
        <button class="guide-tooltip-btn" id="guideBtn">下一步</button>
    </div>
    <div class="guide-arrow" id="guideArrow">⬇</div>
    
    <!-- 剧情弹窗 -->
    <div class="story-modal" id="storyModal">
        <div class="story-content">
            <div class="story-header">
                <div>
                    <div class="story-chapter" id="storyChapter">第一章 入学</div>
                    <div class="story-title" id="storyTitle">剧情标题</div>
                </div>
                <button class="story-close" id="storyClose">×</button>
            </div>
            <div class="story-body" id="storyBody">
                <!-- 剧情内容 -->
            </div>
            <div class="story-choices" id="storyChoices">
                <!-- 选项按钮 -->
            </div>
        </div>
    </div>
    
    <!-- 浮动提示容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- 结局弹窗 -->
    <div class="ending-modal" id="endingModal">
        <div class="ending-content">
            <div class="ending-title" id="endingTitle">结局标题</div>
            <div class="ending-stats">
                <div class="ending-stats-grid" id="endingStatsGrid">
                    <!-- 结局统计数据 -->
                </div>
            </div>
            <div class="ending-desc" id="endingDesc">结局描述</div>
            <button class="restart-btn" id="restartBtn">重新开始</button>
        </div>
    </div>
    
    <!-- 顶部标题 -->
    <div class="header">
        <div class="logo">大学生存<span>大一上</span></div>
        <div class="disclaimer">模拟大一上学期生活，平衡学业、社交与健康</div>
    </div>
    
    <!-- 状态面板 -->
    <div class="status-panel">
        <div class="status-item">
            <div class="status-label">周数</div>
            <div class="status-value" id="weekValue">1</div>
        </div>
        <div class="status-item">
            <div class="status-label">健康</div>
            <div class="status-value" id="healthValue">100</div>
        </div>
        <div class="status-item">
            <div class="status-label">学业</div>
            <div class="status-value" id="studyValue">0</div>
        </div>
        <div class="status-item">
            <div class="status-label">社交</div>
            <div class="status-value" id="socialValue">0</div>
        </div>
        <div class="status-item">
            <div class="status-label">金钱</div>
            <div class="status-value" id="moneyValue">2000</div>
        </div>
        <div class="status-item">
            <div class="status-label">快乐</div>
            <div class="status-value" id="happyValue">80</div>
        </div>
    </div>
    
    <!-- 核心面板容器 -->
    <div class="panels-container">
        <!-- 左侧游戏区 -->
        <div class="game-area">
            <!-- 行动面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">每日行动</div>
                    <div class="panel-progress" id="actionProgress">本周剩余行动: 7</div>
                </div>
                <div class="actions-panel" id="actionsPanel">
                    <button class="action-btn" data-action="study">学习</button>
                    <button class="action-btn" data-action="attendClass">上课</button>
                    <button class="action-btn" data-action="partTimeJob">兼职</button>
                    <button class="action-btn" data-action="socialize">社交</button>
                    <button class="action-btn" data-action="exercise">锻炼</button>
                    <button class="action-btn" data-action="rest">休息</button>
                    <button class="action-btn" data-action="playGame">打游戏</button>
                    <button class="action-btn" data-action="readBook">看书</button>
                </div>
            </div>
            
            <!-- 日志面板 -->
            <div class="panel log-panel">
                <div class="panel-header">
                    <div class="panel-title">事件日志</div>
                    <div class="panel-progress" id="logProgress">总事件: 0</div>
                </div>
                <ul class="log-list" id="logList">
                    <li class="log-item log-default"><span class="log-time">第1周</span>欢迎来到大一上学期生存模拟！开始你的16周大学生活吧！</li>
                </ul>
            </div>
        </div>
        
        <!-- 右侧信息区 -->
        <div class="info-area">
            <!-- 技能面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">技能</div>
                    <div class="panel-progress">已解锁: 0/12</div>
                </div>
                <div class="skills-list" id="skillsList">
                    <div class="skill-item locked">快速阅读 <span class="skill-buff">学习+5</span></div>
                    <div class="skill-item locked">口才 <span class="skill-buff">社交+5</span></div>
                    <div class="skill-item locked">健身达人 <span class="skill-buff">健康+5</span></div>
                </div>
            </div>
            
            <!-- 成就面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">成就</div>
                    <div class="panel-progress">已解锁: 0/20</div>
                </div>
                <div class="achievements-list" id="achievementsList">
                    <div class="achievement-item locked">学霸 <span class="achievement-reward">学业≥100</span></div>
                    <div class="achievement-item locked">社交达人 <span class="achievement-reward">社交≥100</span></div>
                    <div class="achievement-item locked">健身狂魔 <span class="achievement-reward">健康≥100</span></div>
                </div>
            </div>
            
            <!-- 物品面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">物品</div>
                    <div class="panel-progress">持有: 0/8</div>
                </div>
                <div class="items-grid" id="itemsGrid">
                    <div class="item-card disabled">
                        <div class="item-name">咖啡</div>
                        <div class="item-count">x0</div>
                    </div>
                    <div class="item-card disabled">
                        <div class="item-name">课本</div>
                        <div class="item-count">x0</div>
                    </div>
                </div>
            </div>
            
            <!-- 图鉴面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">图鉴</div>
                    <div class="panel-progress">解锁: 0/30</div>
                </div>
                <div class="gallery-grid" id="galleryGrid">
                    <div class="gallery-item locked">剧情1</div>
                    <div class="gallery-item locked">剧情2</div>
                    <div class="gallery-item locked">剧情3</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 游戏核心数据
        const gameData = {
            week: 1,
            maxWeeks: 16, // 改为16周
            actionsLeft: 7,
            stats: {
                health: 100,
                study: 0,
                social: 0,
                money: 2000,
                happy: 80
            },
            skills: [],
            achievements: [],
            items: {},
            gallery: [],
            hasPlayedGuide: false,
            isGuideActive: false
        };
        
        // 尝试读取localStorage
        try {
            gameData.hasPlayedGuide = localStorage.getItem('hasPlayedGuide') === 'true';
        } catch (e) {
            console.log('localStorage不可用，使用默认值');
        }

        // 新手引导步骤
        const guideSteps = [
            {
                target: '#weekValue',
                title: '周数面板',
                text: '这里显示当前的周数，你需要在16周内完成大一上学期的挑战！',
                position: 'bottom'
            },
            {
                target: '#healthValue',
                title: '状态面板',
                text: '这是你的核心状态：健康、学业、社交、金钱和快乐，需要保持平衡！',
                position: 'bottom'
            },
            {
                target: '.action-btn[data-action="study"]',
                title: '行动按钮',
                text: '点击这些按钮进行每日行动，每个行动会消耗一次机会并影响你的状态！',
                position: 'top'
            },
            {
                target: '#logList',
                title: '事件日志',
                text: '这里会记录你所有的行动和事件，随时查看你的成长轨迹！',
                position: 'top'
            },
            {
                target: '#skillsList',
                title: '技能系统',
                text: '完成特定行动可以解锁技能，技能会给你带来永久加成！',
                position: 'left'
            }
        ];
        let currentGuideStep = 0;

        // DOM元素
        const dom = {
            // 状态面板
            weekValue: document.getElementById('weekValue'),
            healthValue: document.getElementById('healthValue'),
            studyValue: document.getElementById('studyValue'),
            socialValue: document.getElementById('socialValue'),
            moneyValue: document.getElementById('moneyValue'),
            happyValue: document.getElementById('happyValue'),
            actionProgress: document.getElementById('actionProgress'),
            
            // 日志
            logList: document.getElementById('logList'),
            logProgress: document.getElementById('logProgress'),
            
            // 面板
            skillsList: document.getElementById('skillsList'),
            achievementsList: document.getElementById('achievementsList'),
            itemsGrid: document.getElementById('itemsGrid'),
            galleryGrid: document.getElementById('galleryGrid'),
            
            // 新手引导
            guideOverlay: document.getElementById('guideOverlay'),
            guideHighlight: document.getElementById('guideHighlight'),
            guideTooltip: document.getElementById('guideTooltip'),
            guideTitle: document.getElementById('guideTitle'),
            guideText: document.getElementById('guideText'),
            guideBtn: document.getElementById('guideBtn'),
            guideArrow: document.getElementById('guideArrow'),
            
            // 剧情弹窗
            storyModal: document.getElementById('storyModal'),
            storyChapter: document.getElementById('storyChapter'),
            storyTitle: document.getElementById('storyTitle'),
            storyBody: document.getElementById('storyBody'),
            storyChoices: document.getElementById('storyChoices'),
            storyClose: document.getElementById('storyClose'),
            
            // 结局弹窗
            endingModal: document.getElementById('endingModal'),
            endingTitle: document.getElementById('endingTitle'),
            endingStatsGrid: document.getElementById('endingStatsGrid'),
            endingDesc: document.getElementById('endingDesc'),
            restartBtn: document.getElementById('restartBtn'),
            
            // 浮动提示
            toastContainer: document.getElementById('toastContainer'),
            
            // 行动按钮
            actionsPanel: document.getElementById('actionsPanel')
        };

        // 初始化游戏
        function initGame() {
            updateUI();
            bindEvents();
            
            // 如果没玩过引导，启动新手引导
            if (!gameData.hasPlayedGuide) {
                setTimeout(() => {
                    startGuide();
                }, 500);
            } else {
                // 显示初始剧情
                showInitialStory();
            }
        }

        // 更新UI
        function updateUI() {
            // 更新状态面板
            dom.weekValue.textContent = gameData.week;
            dom.healthValue.textContent = gameData.stats.health;
            dom.studyValue.textContent = gameData.stats.study;
            dom.socialValue.textContent = gameData.stats.social;
            dom.moneyValue.textContent = gameData.stats.money;
            dom.happyValue.textContent = gameData.stats.happy;
            
            // 更新行动次数
            dom.actionProgress.textContent = `本周剩余行动: ${gameData.actionsLeft}`;
            
            // 高亮低数值状态
            Object.entries(gameData.stats).forEach(([key, value]) => {
                const el = dom[`${key}Value`];
                if (el) {
                    el.classList.toggle('highlight', value < 30);
                }
            });
            
            // 更新日志计数
            const logCount = dom.logList.children.length;
            dom.logProgress.textContent = `总事件: ${logCount}`;
        }

        // 绑定事件
        function bindEvents() {
            // 行动按钮点击
            dom.actionsPanel.addEventListener('click', (e) => {
                if (e.target.classList.contains('action-btn') && gameData.actionsLeft > 0) {
                    const action = e.target.dataset.action;
                    performAction(action);
                }
            });
            
            // 剧情弹窗关闭
            dom.storyClose.addEventListener('click', () => {
                dom.storyModal.classList.remove('active');
            });
            
            // 重新开始游戏
            dom.restartBtn.addEventListener('click', restartGame);
            
            // 新手引导按钮（备用绑定）
            dom.guideBtn.addEventListener('click', handleGuideNext);
        }

        // 执行行动
        function performAction(action) {
            // 消耗行动次数
            gameData.actionsLeft--;
            
            // 不同行动的效果
            const actionEffects = {
                study: {
                    name: '学习',
                    effects: { study: 10, happy: -5, health: -2 }
                },
                attendClass: {
                    name: '上课',
                    effects: { study: 8, happy: -3, health: -1 }
                },
                partTimeJob: {
                    name: '兼职',
                    effects: { money: 200, study: -5, happy: -5, health: -5 }
                },
                socialize: {
                    name: '社交',
                    effects: { social: 10, happy: 5, study: -3 }
                },
                exercise: {
                    name: '锻炼',
                    effects: { health: 10, happy: 5, study: -2 }
                },
                rest: {
                    name: '休息',
                    effects: { health: 8, happy: 8, study: -1 }
                },
                playGame: {
                    name: '打游戏',
                    effects: { happy: 10, health: -3, study: -8 }
                },
                readBook: {
                    name: '看书',
                    effects: { study: 7, happy: 3, health: -1 }
                }
            };
            
            const effect = actionEffects[action];
            if (effect) {
                // 应用效果
                Object.entries(effect.effects).forEach(([stat, value]) => {
                    gameData.stats[stat] = Math.max(0, Math.min(100, gameData.stats[stat] + value));
                    
                    // 显示浮动提示
                    showToast(stat, value);
                });
                
                // 记录日志
                addLog(`进行了${effect.name}行动`, 'log-default');
                
                // 检查游戏结束条件
                if (checkGameOver()) {
                    endGame();
                    return;
                }
                
                // 检查是否本周行动用完
                if (gameData.actionsLeft <= 0) {
                    endWeek();
                }
                
                // 更新UI
                updateUI();
            }
        }
        
        // 检查游戏结束条件
        function checkGameOver() {
            // 检查是否有状态值为负数（健康不能为 0）
            if (gameData.stats.health <= 0) {
                return true;
            }
            // 其他状态可以为 0，但不能为负
            return Object.values(gameData.stats).some(value => value < 0);
        }

        // 结束本周
        function endWeek() {
            gameData.week++;
            gameData.actionsLeft = 7;
            
            // 每周自动扣减
            gameData.stats.health = Math.max(0, gameData.stats.health - 2);
            gameData.stats.happy = Math.max(0, gameData.stats.happy - 1);
            
            addLog(`第${gameData.week-1}周结束，进入第${gameData.week}周`, 'log-event');
            
            // 检查游戏结束条件
            if (checkGameOver()) {
                endGame();
                return;
            }
            
            // 检查游戏结束
            if (gameData.week > gameData.maxWeeks) {
                endGame();
                return;
            }
            
            // 随机事件
            if (Math.random() > 0.5) {
                showRandomEvent();
            }
            
            updateUI();
        }

        // 状态名称映射
        const statNames = {
            health: '健康',
            study: '学业',
            social: '社交',
            money: '金钱',
            happy: '快乐'
        };
        
        // 显示浮动提示
        function showToast(stat, value) {
            const toast = document.createElement('div');
            toast.className = `stat-toast ${value > 0 ? 'stat-plus' : 'stat-minus'}`;
            const statName = statNames[stat] || stat;
            toast.textContent = `${statName}: ${value > 0 ? '+' : ''}${value}`;
            
            dom.toastContainer.appendChild(toast);
            
            // 自动移除
            setTimeout(() => {
                toast.remove();
            }, 1800);
        }

        // 添加日志
        function addLog(text, type = 'log-default') {
            const li = document.createElement('li');
            li.className = `log-item ${type}`;
            
            // 使用游戏内周数作为时间
            const time = `第${gameData.week}周`;
            li.innerHTML = `<span class="log-time">${time}</span>${text}`;
            
            dom.logList.appendChild(li);
            
            // 滚动到底部
            dom.logList.scrollTop = dom.logList.scrollHeight;
        }

        // 显示初始剧情 - 大一上学期版本
        function showInitialStory() {
            dom.storyChapter.textContent = '第一章 初入大学';
            dom.storyTitle.textContent = '大一新生报到';
            dom.storyBody.innerHTML = `
                <div class="story-character">
                    <div class="story-avatar">🎓</div>
                    <div class="story-dialogue">
                        <div class="story-name">辅导员</div>
                        <div class="story-text">欢迎来到大学！你是大一新生，接下来的16周将是你大学生涯的第一个学期。你需要适应大学生活，建立学习习惯，参与社团活动，同时保持身心健康。</div>
                    </div>
                </div>
                <div class="story-character">
                    <div class="story-avatar">👨‍🎓</div>
                    <div class="story-dialogue">
                        <div class="story-name">学长</div>
                        <div class="story-text">大一上学期很关键！要打好学业基础，但也别忘了体验大学生活。图书馆、社团、学生会都是不错的选择。不过要注意平衡，别挂科了！</div>
                    </div>
                </div>
            `;
            
            // 添加选项
            dom.storyChoices.innerHTML = `
                <button class="story-choice" data-choice="start">开始我的大一生活</button>
            `;
            
            // 绑定选项事件（使用事件委托，避免监听器累积）
            const handleChoice = (e) => {
                if (e.target.classList.contains('story-choice')) {
                    dom.storyModal.classList.remove('active');
                    addLog('开始了大一上学期的生活', 'log-story');
                    // 移除事件监听器
                    dom.storyChoices.removeEventListener('click', handleChoice);
                }
            };
            
            dom.storyChoices.addEventListener('click', handleChoice);
            
            dom.storyModal.classList.add('active');
        }

        // 显示随机事件 - 大一上学期背景
        function showRandomEvent() {
            const events = [
                {
                    title: '社团招新',
                    text: '校园里热闹非凡，各大社团正在进行招新活动。学生会、舞蹈社、话剧社、篮球队都在招募新人...',
                    choices: [
                        { text: '加入学生会', effects: { social: 10, study: -3 } },
                        { text: '加入学术社团', effects: { study: 8, social: 5 } },
                        { text: '加入运动社团', effects: { health: 8, social: 5 } },
                        { text: '先观察再说', effects: { happy: 2 } }
                    ]
                },
                {
                    title: '新生座谈会',
                    text: '学院举办了新生座谈会，你可以选择参加不同的活动...',
                    choices: [
                        { text: '参加专业介绍会', effects: { study: 5 } },
                        { text: '参加学长分享会', effects: { social: 5, happy: 3 } },
                        { text: '不参加', effects: { happy: -2 } }
                    ]
                },
                {
                    title: '图书馆偶遇',
                    text: '你在图书馆自习时遇到了一个高年级学长，他正在做项目，邀请你加入...',
                    choices: [
                        { text: '加入项目组', effects: { study: 10, social: 5, health: -3 } },
                        { text: '婉拒并请教问题', effects: { study: 3, social: 2 } },
                        { text: '委婉拒绝', effects: { happy: 1 } }
                    ]
                },
                {
                    title: '期中考试临近',
                    text: '期中考试即将来临，同学们都在紧张复习...',
                    choices: [
                        { text: '全力冲刺复习', effects: { study: 15, happy: -5, health: -3 } },
                        { text: '平衡复习与休息', effects: { study: 8, happy: 2 } },
                        { text: '靠前突击', effects: { study: 5, happy: -3 } }
                    ]
                },
                {
                    title: '宿舍聚会',
                    text: '室友提议今晚在宿舍开个小聚会，增进感情...',
                    choices: [
                        { text: '积极参加', effects: { social: 8, happy: 5, study: -2 } },
                        { text: '简单参与一下', effects: { social: 3, happy: 2 } },
                        { text: '去图书馆自习', effects: { study: 5, social: -2 } }
                    ]
                }
            ];
            
            const randomEvent = events[Math.floor(Math.random() * events.length)];
            
            dom.storyChapter.textContent = `第${gameData.week}周 校园事件`;
            dom.storyTitle.textContent = randomEvent.title;
            dom.storyBody.innerHTML = `
                <div class="story-character">
                    <div class="story-avatar">🏫</div>
                    <div class="story-dialogue">
                        <div class="story-name">大一生活</div>
                        <div class="story-text">${randomEvent.text}</div>
                    </div>
                </div>
            `;
            
            // 添加选项
            dom.storyChoices.innerHTML = '';
            randomEvent.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'story-choice';
                btn.dataset.index = index;
                btn.textContent = choice.text;
                
                btn.addEventListener('click', () => {
                    // 应用选项效果
                    Object.entries(choice.effects).forEach(([stat, value]) => {
                        gameData.stats[stat] = Math.max(0, Math.min(100, gameData.stats[stat] + value));
                        showToast(stat, value);
                    });
                    
                    addLog(`选择了：${choice.text}`, 'log-event');
                    dom.storyModal.classList.remove('active');
                    updateUI();
                });
                
                dom.storyChoices.appendChild(btn);
            });
            
            dom.storyModal.classList.add('active');
        }

        // 结束游戏 - 大一上学期结局
        function endGame() {
            // 计算结局
            let ending = '';
            let endingTitle = '';
            let endingDesc = '';
            
            const avgStat = (gameData.stats.study + gameData.stats.social + gameData.stats.health + gameData.stats.happy) / 4;
            
            if (avgStat >= 80) {
                endingTitle = '完美开局';
                endingDesc = '你的大一上学期表现堪称完美！学业优秀、社交广泛、身心健康，为你的大学生涯奠定了坚实的基础。老师们都对你赞不绝口，同学们也愿意与你交往。你成功地从高中生转变为优秀的大学生！';
            } else if (avgStat >= 60) {
                endingTitle = '平稳过渡';
                endingDesc = '你的大一上学期过得还算顺利。虽然有过一些小波折，但总体上适应了大学生活。学业中规中矩，也有一些朋友，算是完成了从高中到大学的过渡。下学期可以更加努力！';
            } else if (avgStat >= 40) {
                endingTitle = '挣扎前行';
                endingDesc = '你的大一上学期过得有些艰难。在学习、社交或健康方面都遇到了一些问题，大学生活让你感到有些不适应。不过别灰心，这只是开始，还有机会调整！';
            } else {
                endingTitle = '迷茫开局';
                endingDesc = '你的大一上学期过得不太理想，似乎还没有找到适合自己的大学生活节奏。学业、社交、健康都出现了问题。也许需要重新思考自己的大学生活规划，寻求帮助也不丢人。';
            }
            
            // 根据具体表现添加额外评价
            if (gameData.stats.study >= 90) {
                endingDesc += '\n\n🏆 学业成就：你是学习小能手，大一上学期就打下了扎实的学业基础！';
            }
            if (gameData.stats.social >= 90) {
                endingDesc += '\n\n🎉 社交达人：你迅速融入了大学生活，结交了许多朋友！';
            }
            if (gameData.stats.health >= 90) {
                endingDesc += '\n\n💪 健康之星：你保持着良好的生活习惯和健康的体魄！';
            }
            
            // 更新结局弹窗
            dom.endingTitle.textContent = endingTitle;
            dom.endingDesc.textContent = endingDesc;
            
            // 结局统计
            dom.endingStatsGrid.innerHTML = `
                <div class="ending-stat-item">
                    <div class="status-label">学业</div>
                    <div class="status-value">${gameData.stats.study}</div>
                </div>
                <div class="ending-stat-item">
                    <div class="status-label">社交</div>
                    <div class="status-value">${gameData.stats.social}</div>
                </div>
                <div class="ending-stat-item">
                    <div class="status-label">健康</div>
                    <div class="status-value">${gameData.stats.health}</div>
                </div>
                <div class="ending-stat-item">
                    <div class="status-label">金钱</div>
                    <div class="status-value">${gameData.stats.money}</div>
                </div>
                <div class="ending-stat-item">
                    <div class="status-label">快乐</div>
                    <div class="status-value">${gameData.stats.happy}</div>
                </div>
                <div class="ending-stat-item">
                    <div class="status-label">综合评分</div>
                    <div class="status-value">${Math.round(avgStat)}</div>
                </div>
            `;
            
            // 显示结局弹窗
            dom.endingModal.classList.add('active');
        }

        // 重新开始游戏
        function restartGame() {
            // 重置游戏数据
            gameData.week = 1;
            gameData.actionsLeft = 7;
            gameData.stats = {
                health: 100,
                study: 0,
                social: 0,
                money: 2000,
                happy: 80
            };
            gameData.skills = [];
            gameData.achievements = [];
            gameData.items = {};
            gameData.gallery = [];
            
            // 清空日志
            dom.logList.innerHTML = '<li class="log-item log-default"><span class="log-time">第1周</span>欢迎来到大一上学期生存模拟！开始你的16周大学生活吧！</li>';
            
            // 隐藏结局弹窗
            dom.endingModal.classList.remove('active');
            
            // 更新UI
            updateUI();
            
            // 显示初始剧情
            showInitialStory();
        }

        // ===== 新手引导相关函数 =====
        function startGuide() {
            gameData.isGuideActive = true;
            currentGuideStep = 0;
            
            // 显示引导遮罩
            dom.guideOverlay.classList.add('active');
            
            // 显示第一步
            showGuideStep();
        }

        function showGuideStep() {
            if (currentGuideStep >= guideSteps.length) {
                endGuide();
                return;
            }
            
            const step = guideSteps[currentGuideStep];
            const targetEl = document.querySelector(step.target);
            
            if (!targetEl) {
                currentGuideStep++;
                showGuideStep();
                return;
            }
            
            const rect = targetEl.getBoundingClientRect();
            
            // 设置高亮框
            dom.guideHighlight.style.width = rect.width + 20 + 'px';
            dom.guideHighlight.style.height = rect.height + 20 + 'px';
            dom.guideHighlight.style.left = rect.left - 10 + 'px';
            dom.guideHighlight.style.top = rect.top - 10 + 'px';
            dom.guideHighlight.style.display = 'block';
            
            // 设置提示框位置
            let tooltipX, tooltipY;
            const gap = 15;
            
            switch(step.position) {
                case 'bottom':
                    tooltipX = rect.left;
                    tooltipY = rect.bottom + gap;
                    dom.guideArrow.style.left = rect.left + rect.width/2 - 15 + 'px';
                    dom.guideArrow.style.top = rect.bottom - 10 + 'px';
                    dom.guideArrow.textContent = '⬆';
                    break;
                case 'top':
                    tooltipX = rect.left;
                    tooltipY = rect.top - 180;
                    dom.guideArrow.style.left = rect.left + rect.width/2 - 15 + 'px';
                    dom.guideArrow.style.top = rect.top + rect.height + 10 + 'px';
                    dom.guideArrow.textContent = '⬇';
                    break;
                case 'left':
                    tooltipX = rect.right + gap;
                    tooltipY = rect.top;
                    dom.guideArrow.style.left = rect.right - 10 + 'px';
                    dom.guideArrow.style.top = rect.top + rect.height/2 - 15 + 'px';
                    dom.guideArrow.textContent = '⬅';
                    break;
                case 'right':
                    tooltipX = rect.left - 340;
                    tooltipY = rect.top;
                    dom.guideArrow.style.left = rect.left - 40 + 'px';
                    dom.guideArrow.style.top = rect.top + rect.height/2 - 15 + 'px';
                    dom.guideArrow.textContent = '➡';
                    break;
            }
            
            // 确保提示框在可视区域内
            tooltipX = Math.max(10, Math.min(tooltipX, window.innerWidth - 340));
            tooltipY = Math.max(10, Math.min(tooltipY, window.innerHeight - 200));
            
            // 设置提示框内容和位置
            dom.guideTitle.textContent = step.title;
            dom.guideText.textContent = step.text;
            dom.guideTooltip.style.left = tooltipX + 'px';
            dom.guideTooltip.style.top = tooltipY + 'px';
            dom.guideTooltip.style.display = 'block';
            
            // 更新按钮文字
            dom.guideBtn.textContent = currentGuideStep === guideSteps.length - 1 ? '开始游戏！' : '下一步';
            
            // 显示箭头
            dom.guideArrow.style.display = 'block';
            
            // 确保按钮可点击
            dom.guideBtn.style.pointerEvents = 'auto';
            dom.guideBtn.style.zIndex = '10001';
        }

        function handleGuideNext() {
            if (!gameData.isGuideActive) return;
            
            currentGuideStep++;
            showGuideStep();
        }

        function endGuide() {
            gameData.isGuideActive = false;
            gameData.hasPlayedGuide = true;
            
            // 保存引导状态
            try {
                localStorage.setItem('hasPlayedGuide', 'true');
            } catch (e) {
                console.log('localStorage不可用，无法保存引导状态');
            }
            
            // 隐藏引导元素
            dom.guideOverlay.classList.remove('active');
            dom.guideHighlight.style.display = 'none';
            dom.guideTooltip.style.display = 'none';
            dom.guideArrow.style.display = 'none';
            
            // 显示初始剧情
            showInitialStory();
            
            addLog('🎉 完成新手引导！开始你的大一生活吧！', 'log-story');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
