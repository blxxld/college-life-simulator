<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生存·大一上 | 趣味增强版（醒目日志）</title>
    <style>
        /* 核心风格：暗黑科技风 + 沉浸式叙事 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body {
            background: #0a0a0a;
            color: #00ff9d;
            min-height: 100vh;
            padding: 20px;
            background-image:
                linear-gradient(rgba(0, 255, 157, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            overflow-x: hidden;
        }
        
        /* ============ 新手引导样式 ============ */
        .guide-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9998;
            display: none;
            pointer-events: auto;
        }
        .guide-overlay.active { display: block; }
        
        .guide-highlight {
            position: fixed;
            z-index: 9999;
            border: 3px solid #00ff9d;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1);
            pointer-events: none;
            animation: guidePulse 1.5s infinite;
            display: none;
        }
        @keyframes guidePulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 255, 157, 0.5), inset 0 0 30px rgba(0, 255, 157, 0.1); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 157, 0.8), inset 0 0 50px rgba(0, 255, 157, 0.2); }
        }
        
        .guide-tooltip {
            position: fixed;
            z-index: 10000;
            background: rgba(0, 20, 10, 0.95);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            padding: 20px;
            max-width: 320px;
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.3);
            display: none;
            pointer-events: auto !important;
        }
        .guide-tooltip-title {
            font-size: 16px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .guide-tooltip-text {
            font-size: 14px;
            color: rgba(0, 255, 157, 0.9);
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .guide-tooltip-btn {
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            pointer-events: auto !important;
            z-index: 10001;
        }
        .guide-tooltip-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        .guide-arrow {
            position: fixed;
            z-index: 9999;
            font-size: 40px;
            color: #00ff9d;
            animation: guideBounce 1s infinite;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.8);
            display: none;
        }
        @keyframes guideBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* ============ 剧情弹窗样式 ============ */
        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .story-modal.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .story-content {
            max-width: 600px;
            width: 90%;
            background: rgba(0, 20, 10, 0.9);
            border: 2px solid #00ff9d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 255, 157, 0.2);
        }
        .story-header {
            background: rgba(0, 40, 20, 0.8);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .story-chapter {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .story-title {
            font-size: 20px;
            font-weight: bold;
            color: #00ff9d;
            letter-spacing: 1px;
        }
        .story-body {
            padding: 25px;
        }
        .story-character {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .story-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 255, 157, 0.2);
            border: 2px solid #00ff9d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .story-dialogue {
            flex: 1;
        }
        .story-name {
            font-size: 14px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 5px;
        }
        .story-text {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.7;
        }
        .story-choices {
            padding: 20px;
            background: rgba(0, 10, 5, 0.5);
            border-top: 1px solid rgba(0, 255, 157, 0.2);
        }
        .story-choice {
            display: block;
            width: 100%;
            padding: 12px 20px;
            margin-bottom: 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 6px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
        }
        .story-choice:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            transform: translateX(5px);
        }
        .story-choice:last-child { margin-bottom: 0; }
        .story-close {
            background: none;
            border: none;
            color: rgba(0, 255, 157, 0.6);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .story-close:hover { color: #00ff9d; }
        
        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            margin-bottom: 30px;
        }
        .logo {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            font-weight: bold;
        }
        .logo span { color: #ff4757; }
        .disclaimer {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.6);
            max-width: 300px;
        }
        /* 状态面板 */
        .status-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .status-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 4px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .status-label {
            font-size: 12px;
            text-transform: uppercase;
            color: rgba(0, 255, 157, 0.7);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .status-value {
            font-size: 22px;
            font-weight: bold;
            color: #00ff9d;
        }
        .status-value.highlight { color: #ff4757; }
        
        /* 提示区域 */
        .hints-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .week-hint {
            padding: 10px;
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid #00ff9d;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #00ff9d;
            transition: all 0.3s;
        }
        .week-hint.exam-week {
            background: rgba(255, 70, 70, 0.2);
            border-color: #ff4757;
            color: #ff4757;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; background: rgba(255, 70, 70, 0.2); }
            50% { opacity: 1; background: rgba(255, 70, 70, 0.4); }
            100% { opacity: 0.8; background: rgba(255, 70, 70, 0.2); }
        }
        .advice-hint {
            padding: 8px;
            background: rgba(0, 30, 15, 0.6);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 4px;
            font-size: 13px;
            color: #00ff9d;
            text-align: center;
        }
        .task-hint {
            padding: 8px;
            background: rgba(0, 40, 20, 0.6);
            border: 1px solid #ffd166;
            border-radius: 4px;
            font-size: 13px;
            color: #ffd166;
            text-align: center;
        }
        .pet-hint {
            padding: 8px;
            background: rgba(255, 193, 7, 0.15);
            border: 1px solid #ffc107;
            border-radius: 4px;
            font-size: 13px;
            color: #ffc107;
            text-align: center;
        }
        
        /* 核心面板容器 */
        .panels-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 30px;
        }
        /* 左侧游戏区 */
        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 面板通用样式 */
        .panel {
            padding: 20px;
            background: rgba(0, 20, 10, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
        }
        .panel-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ff9d;
        }
        .panel-progress {
            font-size: 12px;
            color: rgba(0, 255, 157, 0.7);
        }
        /* 行动按钮区 */
        .actions-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }
        .action-btn {
            padding: 12px 10px;
            background: rgba(0, 30, 15, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.4);
            border-radius: 4px;
            color: #00ff9d;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .action-btn:hover {
            background: rgba(0, 40, 20, 0.9);
            border-color: #00ff9d;
            color: #ffffff;
            transform: translateY(-2px);
        }
        .action-btn:disabled {
            background: rgba(30, 30, 30, 0.5);
            border-color: rgba(0, 255, 157, 0.1);
            color: rgba(0, 255, 157, 0.3);
            cursor: not-allowed;
            transform: none;
        }
        /* 人际关系面板 */
        .relationship-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 5px;
        }
        .relation-item {
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
        }
        .relation-name {
            font-size: 12px;
            font-weight: bold;
            color: #00ff9d;
            margin-bottom: 4px;
        }
        .relation-bar {
            height: 6px;
            background: rgba(0, 255, 157, 0.2);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .relation-fill {
            height: 100%;
            background: #00ff9d;
            width: 0%;
            transition: width 0.3s;
        }
        .relation-value {
            font-size: 10px;
            color: #00ff9d;
        }
        
        /* ========== 日志面板增强（更显眼） ========== */
        .log-panel {
            height: 280px;
            overflow-y: auto;
            position: relative;
            background: rgba(0, 10, 5, 0.9);
            border: 2px solid #00ff9d;              /* 加粗边框 */
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.7); /* 外发光 */
            border-radius: 8px;
        }
        .log-panel::-webkit-scrollbar { width: 6px; }
        .log-panel::-webkit-scrollbar-track { background: rgba(0, 30, 15, 0.5); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb { background: rgba(0, 255, 157, 0.8); border-radius: 3px; }
        .log-panel::-webkit-scrollbar-thumb:hover { background: #00ff9d; }
        .log-list { list-style: none; padding: 5px 0; }
        .log-item {
            font-size: 15px;                        /* 稍大字号 */
            padding: 12px 15px;
            margin: 4px 0;
            border-radius: 4px;
            border-left: 4px solid transparent;
            transition: background 0.2s;
            font-weight: bold;                       /* 加粗 */
            text-shadow: 0 0 5px currentColor;       /* 发光文字 */
            animation: logAppear 0.3s ease-out;      /* 入场动画 */
        }
        @keyframes logAppear {
            0% { opacity: 0; transform: translateX(-15px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .log-item.log-default { color: #00ff9d; background: rgba(0, 30, 15, 0.5); border-left-color: #00ff9d; }
        .log-item.log-event { color: #66ccff; background: rgba(0, 40, 60, 0.5); border-left-color: #66ccff; }
        .log-item.log-warning { color: #ff9966; background: rgba(60, 30, 0, 0.5); border-left-color: #ff9966; }
        .log-item.log-reward { color: #ffd166; background: rgba(60, 50, 0, 0.5); border-left-color: #ffd166; }
        .log-item.log-story { color: #ff79c6; background: rgba(40, 0, 30, 0.5); border-left-color: #ff79c6; }
        .log-item.log-skill { color: #bd93f9; background: rgba(60, 0, 60, 0.5); border-left-color: #bd93f9; }
        .log-time {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.7);
            margin-right: 10px;
            font-weight: normal;
        }
        
        /* 右侧信息区 */
        .info-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .skills-list, .achievements-list {
            max-height: 120px;
            overflow-y: auto;
        }
        .skill-item, .achievement-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .skill-item.unlocked, .achievement-item.unlocked { color: #00ff9d; }
        .skill-item.locked, .achievement-item.locked { color: rgba(0, 255, 157, 0.4); }
        .skill-buff, .achievement-reward {
            font-size: 11px;
            color: rgba(0, 255, 157, 0.6);
            background: rgba(0,255,157,0.1);
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        /* 物品面板 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .item-card {
            padding: 10px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .item-card:hover:not(.disabled) {
            background: rgba(0, 40, 20, 0.8);
            border-color: #00ff9d;
            transform: translateY(-2px);
        }
        .item-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .item-name { font-size: 12px; color: #00ff9d; margin-bottom: 5px; font-weight: bold; }
        .item-count { 
            font-size: 10px; 
            color: rgba(0, 255, 157, 0.6); 
            position: absolute;
            top: 5px;
            right: 8px;
            background: #00ff9d;
            color: #000;
            padding: 1px 5px;
            border-radius: 10px;
            font-weight: bold;
        }
        
        /* 图鉴面板 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .gallery-item {
            padding: 8px;
            background: rgba(0, 30, 15, 0.5);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 4px;
            text-align: center;
            font-size: 11px;
            opacity: 0.4;
            transition: all 0.3s;
            cursor: help;
        }
        .gallery-item.unlocked { 
            opacity: 1; 
            border-color: #00ff9d; 
            background: rgba(0, 40, 20, 0.8);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }
        .gallery-item:hover { transform: scale(1.05); }
        
        /* 浮动提示容器 */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .stat-toast {
            padding: 8px 15px;
            border-radius: 4px;
            color: #0a0a0a;
            font-weight: bold;
            animation: fadeInUp 0.3s, fadeOut 1.5s 1s forwards;
            font-size: 12px;
            text-transform: uppercase;
            min-width: 120px;
            text-align: center;
        }
        .stat-toast.stat-plus { background: #00ff9d; border: 1px solid #00cc7a; }
        .stat-toast.stat-minus { background: #ff4757; border-color: #e03545; color: white; }
        .stat-toast.stat-reward { background: #ffd166; border-color: #ffc107; }
        .stat-toast.stat-skill { background: #bd93f9; border-color: #bd93f9; color: white; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        
        /* 结局弹窗 */
        .ending-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 5, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            animation: fadeIn 0.5s;
            padding: 20px;
            display: none;
        }
        .ending-modal.active { display: flex; }
        .ending-content {
            max-width: 600px;
            width: 100%;
            padding: 40px;
            background: rgba(0, 20, 10, 0.8);
            border: 1px solid #00ff9d;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 255, 157, 0.1);
        }
        .ending-title {
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #00ff9d;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            padding-bottom: 15px;
        }
        .ending-stats {
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 30, 15, 0.7);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        .ending-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .ending-stat-item {
            font-size: 14px;
            padding: 10px;
            background: rgba(0, 20, 10, 0.5);
            border-radius: 4px;
        }
        .ending-desc {
            font-size: 16px;
            line-height: 1.8;
            color: rgba(0, 255, 157, 0.9);
            margin: 20px 0;
        }
        .restart-btn {
            padding: 15px 40px;
            background: #00ff9d;
            color: #0a0a0a;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }
        .restart-btn:hover {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        
        /* 响应式 */
        @media (max-width: 800px) {
            .panels-container { grid-template-columns: 1fr; }
            .info-area { order: -1; }
            .status-panel { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 新手引导元素 -->
    <div class="guide-overlay" id="guideOverlay"></div>
    <div class="guide-highlight" id="guideHighlight"></div>
    <div class="guide-tooltip" id="guideTooltip">
        <div class="guide-tooltip-title" id="guideTitle">引导标题</div>
        <div class="guide-tooltip-text" id="guideText">引导内容</div>
        <button class="guide-tooltip-btn" id="guideBtn">下一步</button>
    </div>
    <div class="guide-arrow" id="guideArrow">⬇</div>
    
    <!-- 剧情弹窗 -->
    <div class="story-modal" id="storyModal">
        <div class="story-content">
            <div class="story-header">
                <div>
                    <div class="story-chapter" id="storyChapter">第一章 入学</div>
                    <div class="story-title" id="storyTitle">剧情标题</div>
                </div>
                <button class="story-close" id="storyClose">×</button>
            </div>
            <div class="story-body" id="storyBody"></div>
            <div class="story-choices" id="storyChoices"></div>
        </div>
    </div>
    
    <!-- 浮动提示容器 -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- 结局弹窗 -->
    <div class="ending-modal" id="endingModal">
        <div class="ending-content">

        // 游戏核心状态
        const gameData = {
            week: 1,
            maxWeeks: 16,
            actionsLeft: 7,
            stats: { health: 100, study: 0, social: 0, money: 2000, happy: 80 },
            
            actionCounts: {},
            unlockedSkills: [],
            unlockedAchievements: [],
            inventory: { coffee: 1, medicine: 1, energyDrink: 1, catFood: 0, mysteriousCharm: 0 },
            unlockedGallery: [],
            
            itemUseCount: {}, 
            
            // 人际关系
            relations: {
                classmate: 20,
                clubber: 20,
                counselor: 20
            },
            // 周常任务
            currentTask: null,
            taskProgress: 0,
            taskCompleted: false,
            
            // 新增趣味状态
            hasCat: false,           // 是否收养了猫
            catHappy: 0,             // 猫咪快乐度（影响主人）
            horrorEventCount: 0,      // 经历怪谈次数
            metMerchant: false,       // 是否遇到过神秘商人
            
            // 事件标志（用于成就）
            eventFlags: {},
            
            hasPlayedGuide: false,
            isGuideActive: false
        };

        // ================= 初始化 =================
        try {
            gameData.hasPlayedGuide = localStorage.getItem('hasPlayedGuide') === 'true';

        const dom = {

            moneyValue: document.getElementById('moneyValue'),

            achievementsList: document.getElementById('achievementsList'),

            adviceHint: document.getElementById('adviceHint'),
            taskHint: document.getElementById('taskHint'),
            petHint: document.getElementById('petHint'),

        };

        function initGame() {
            unlockGallery('g_start');
            generateNewTask();
            updateUI();
            renderAllPanels();
            bindEvents();
            
            if (!gameData.hasPlayedGuide) {
                setTimeout(() => startGuide(), 500);
            } else {
                showInitialStory();
            }
        }

        // ================= 渲染函数 =================
        function renderAllPanels() {
            renderSkillsPanel();
            renderAchievementsPanel();
            renderItemsPanel();
            renderGalleryPanel();
            renderRelationshipPanel();
        }

        function renderSkillsPanel() {
            dom.skillsList.innerHTML = '';
            let unlockedCount = 0;
            SKILLS_DATA.forEach(skill => {
                const isUnlocked = gameData.unlockedSkills.includes(skill.id);
                if (isUnlocked) unlockedCount++;
                const div = document.createElement('div');
                div.className = `skill-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                div.innerHTML = `<span>${isUnlocked ? '✓' : '🔒'} ${skill.name}</span><span class="skill-buff">${skill.desc}</span>`;
                dom.skillsList.appendChild(div);
            });
            dom.skillProgress.textContent = `已解锁: ${unlockedCount}/${SKILLS_DATA.length}`;
        }

        function renderAchievementsPanel() {
            dom.achievementsList.innerHTML = '';
            let unlockedCount = 0;
            ACHIEVEMENTS_DATA.forEach(ach => {
                const isUnlocked = gameData.unlockedAchievements.includes(ach.id);
                if (isUnlocked) unlockedCount++;
                const div = document.createElement('div');
                div.className = `achievement-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                div.innerHTML = `<span>${isUnlocked ? '🏆' : '🔒'} ${ach.name}</span><span class="achievement-reward">${ach.desc}</span>`;
                dom.achievementsList.appendChild(div);
            });
            dom.achievementProgress.textContent = `已解锁: ${unlockedCount}/${ACHIEVEMENTS_DATA.length}`;
        }

        function renderItemsPanel() {
            dom.itemsGrid.innerHTML = '';
            let ownedTypes = 0;
            Object.entries(ITEMS_DATA).forEach(([id, item]) => {
                const count = gameData.inventory[id] || 0;
                if (count > 0) ownedTypes++;
                const div = document.createElement('div');
                div.className = `item-card ${count > 0 ? '' : 'disabled'}`;
                div.dataset.itemId = id;
                div.innerHTML = `${count > 0 ? `<div class="item-count">x${count}</div>` : ''}<div class="item-name">${item.name}</div><div class="item-desc" style="font-size:10px; color:#888; margin-top:4px;">${count > 0 ? '点击使用' : '无'}</div>`;
                if (count > 0) {
                    div.addEventListener('click', () => useItem(id));
                }
                dom.itemsGrid.appendChild(div);
            });
            dom.itemProgress.textContent = `持有种类: ${ownedTypes}`;
        }

        function renderGalleryPanel() {
            dom.galleryGrid.innerHTML = '';
            let unlockedCount = 0;
            GALLERY_DATA.forEach(entry => {
                const isUnlocked = gameData.unlockedGallery.includes(entry.id);
                if (isUnlocked) unlockedCount++;
                const div = document.createElement('div');
                div.className = `gallery-item ${isUnlocked ? 'unlocked' : ''}`;
                div.textContent = isUnlocked ? entry.name : '???';
                div.title = isUnlocked ? entry.desc : '未解锁';
                dom.galleryGrid.appendChild(div);
            });
            dom.galleryProgress.textContent = `解锁: ${unlockedCount}/${GALLERY_DATA.length}`;
        }

        function renderRelationshipPanel() {
            if (!dom.relationshipGrid) return;
            dom.relationshipGrid.innerHTML = '';
            RELATIONS_DATA.forEach(rel => {
                const value = gameData.relations[rel.id] || 20;
                const div = document.createElement('div');
                div.className = 'relation-item';
                div.innerHTML = `
                    <div class="relation-name">${rel.name}</div>
                    <div class="relation-bar">
                        <div class="relation-fill" style="width: ${value}%;"></div>
                    </div>
                    <div class="relation-value">${value}/100</div>
                `;
                dom.relationshipGrid.appendChild(div);
            });
        }

        // ================= 核心逻辑 =================
        function updateStat(stat, delta) {
            if (stat === 'money') {
                gameData.stats[stat] = Math.max(0, gameData.stats[stat] + delta);
            } else {
                gameData.stats[stat] = Math.max(0, Math.min(100, gameData.stats[stat] + delta));
            }
        }

        function addRelation(relId, delta) {
            if (!gameData.relations[relId]) return;
            let newVal = gameData.relations[relId] + delta;
            newVal = Math.max(0, Math.min(100, newVal));
            gameData.relations[relId] = newVal;
            renderRelationshipPanel();
        }

        function applySocialBonus(action) {
            if (action === 'socialize') {
                const relKeys = Object.keys(gameData.relations);
                const randomRel = relKeys[Math.floor(Math.random() * relKeys.length)];
                addRelation(randomRel, 2);
                addLog(`💬 你和 ${RELATIONS_DATA.find(r=>r.id===randomRel).name} 聊得很开心，好感+2`, 'log-event');
            }
        }

        // ========== 猫咪系统 ==========
        function updatePetHint() {
            if (!dom.petHint) return;
            if (gameData.hasCat) {
                dom.petHint.textContent = `🐱 猫咪陪伴你 (快乐+${gameData.catHappy})`;
            } else {
                dom.petHint.textContent = '🐱 没有宠物 (或许可以收养一只流浪猫)';
            }
        }

        function feedCat() {
            if (!gameData.hasCat) return;
            gameData.catHappy = Math.min(100, gameData.catHappy + 10);
            updateStat('happy', 5);
            addLog('你给猫咪喂了猫粮，它很开心，你也感到快乐', 'log-reward');
            updatePetHint();
        }

        // ========== 周常任务系统 ==========
        function generateNewTask() {
            const pool = TASK_POOL;
            const task = { ...pool[Math.floor(Math.random() * pool.length)] };
            task.current = 0;
            task.completed = false;
            gameData.currentTask = task;
            gameData.taskProgress = 0;
            gameData.taskCompleted = false;
            updateTaskHint();
        }

        function updateTaskProgress(action) {
            if (!gameData.currentTask || gameData.taskCompleted) return;
            const task = gameData.currentTask;
            if (task.type === 'action' && task.action === action) {
                task.current = (task.current || 0) + 1;
                if (task.current >= task.target) {
                    completeTask();
                }
            } else if (task.type === 'stat') {
                if (gameData.stats[task.stat] >= task.target) {
                    completeTask();
                }
            }
            updateTaskHint();
        }

        function completeTask() {
            if (gameData.taskCompleted) return;
            gameData.taskCompleted = true;
            const task = gameData.currentTask;
            addLog(`✅ 完成本周任务：${task.desc}，获得奖励！`, 'log-reward');
            if (task.reward) {
                Object.entries(task.reward).forEach(([stat, val]) => {
                    updateStat(stat, val);
                    showToast(stat, val);
                });
            }

        // ========== 其他核心函数 ==========
        function useItem(itemId) {
            const item = ITEMS_DATA[itemId];
            if (!item || !gameData.inventory[itemId]) return;
            
            gameData.inventory[itemId]--;
            gameData.itemUseCount[itemId] = (gameData.itemUseCount[itemId] || 0) + 1;
            
            if (itemId === 'catFood' && gameData.hasCat) {
                feedCat();
            } else {
                Object.entries(item.effect).forEach(([stat, val]) => {
                    if (gameData.stats[stat] !== undefined) {
                        updateStat(stat, val);
                    }
                    showToast(stat, val);
                });
            }
            
            if (itemId === 'giftBox') {
                addRelation('counselor', 5);
                addLog('🎁 辅导员收到礼物，好感+5', 'log-event');
            }
            
            addLog(`使用了 ${item.name}`, 'log-event');
            renderItemsPanel();
            updateUI();
            checkAchievements();
        }

        function applyMoodToEffects(effects) {
            if (gameData.relations.counselor >= 70) {
                if (effects.health) effects.health = Math.floor(effects.health * 1.1);
            }
            if (gameData.relations.classmate >= 70) {
                if (effects.study) effects.study = Math.floor(effects.study * 1.1);
            }
            if (gameData.relations.clubber >= 70) {
                if (effects.social) effects.social = Math.floor(effects.social * 1.1);
            }
            if (gameData.hasCat) {
                gameData.catHappy = Math.min(100, gameData.catHappy + 1);
                if (effects.happy) effects.happy += Math.floor(gameData.catHappy / 20);
            }
            
            if (gameData.stats.happy < 30) {
                if (effects.study) effects.study = Math.floor(effects.study * 0.6);
                if (effects.social) effects.social = Math.floor(effects.social * 0.5);
                if (effects.happy) effects.happy = Math.floor(effects.happy * 0.8);
                addLog('😞 心情低落，行动效果下降', 'log-warning');
            } else if (gameData.stats.happy > 80) {
                if (effects.study) effects.study = Math.floor(effects.study * 1.2);
                if (effects.social) effects.social = Math.floor(effects.social * 1.2);
                addLog('😊 心情愉悦，行动效果提升', 'log-reward');
            }
            if (gameData.stats.health < 30) {
                Object.keys(effects).forEach(key => {
                    if (key !== 'money') effects[key] = Math.floor(effects[key] * 0.5);
                });
                addLog('🤒 身体不适，所有效果减半', 'log-warning');
            }
            return effects;
        }

        function checkExamWeek() {
            if (EXAM_WEEKS.includes(gameData.week)) {
                const studyScore = gameData.stats.study;
                addLog(`📝 本周是考试周！你的学业成绩为 ${studyScore}`, 'log-event');
                unlockGallery('g_exam');
                if (studyScore >= 70) {
                    addLog('🎉 考试成绩优异，获得奖励！', 'log-reward');
                    updateStat('money', 200);
                    updateStat('happy', 10);
                    showToast('money', 200);
                    showToast('happy', 10);
                    addRelation('classmate', 5);
                } else if (studyScore < 40) {
                    addLog('😰 考试不及格，受到打击', 'log-warning');
                    updateStat('happy', -15);
                    updateStat('study', -5);
                    showToast('happy', -15);
                } else {
                    addLog('📚 考试通过，继续努力', 'log-default');
                }
                if (gameData.week === 4 && studyScore >= 70) unlockGallery('g_midterm');
            }
        }

        function checkAchievements() {
            if (gameData.hasCat && !gameData.unlockedAchievements.includes('catLover')) {
                const ach = ACHIEVEMENTS_DATA.find(a => a.id === 'catLover');
                if (ach) {
                    gameData.unlockedAchievements.push('catLover');
                    addLog(`🏆 达成成就：${ach.name}！`, 'log-reward');
                    if (ach.reward) {
                        Object.entries(ach.reward).forEach(([stat, val]) => updateStat(stat, val));
                    }
                    unlockGallery('g_cat');
                }
            }
            if (gameData.metMerchant && !gameData.unlockedAchievements.includes('luckyDog')) {
                const ach = ACHIEVEMENTS_DATA.find(a => a.id === 'luckyDog');
                if (ach) {
                    gameData.unlockedAchievements.push('luckyDog');
                    addLog(`🏆 达成成就：${ach.name}！`, 'log-reward');
                    if (ach.reward) {
                        Object.entries(ach.reward).forEach(([stat, val]) => updateStat(stat, val));
                    }
                }
            }
            if (gameData.horrorEventCount >= 3 && !gameData.unlockedAchievements.includes('ghostHunter')) {
                const ach = ACHIEVEMENTS_DATA.find(a => a.id === 'ghostHunter');
                if (ach) {
                    gameData.unlockedAchievements.push('ghostHunter');
                    addLog(`🏆 达成成就：${ach.name}！`, 'log-reward');
                    if (ach.reward) {
                        Object.entries(ach.reward).forEach(([stat, val]) => updateStat(stat, val));
                    }
                }
            }
            
            ACHIEVEMENTS_DATA.forEach(ach => {
                if (gameData.unlockedAchievements.includes(ach.id)) return;
                const cond = ach.condition;
                let unlocked = false;
                
                if (cond.type === 'stat' && gameData.stats[cond.stat] >= cond.value) {
                    unlocked = true;
                } else if (cond.type === 'week' && gameData.week >= cond.value) {
                    unlocked = true;
                } else if (cond.type === 'weekAndStat') {
                    if (gameData.week >= cond.week && gameData.stats[cond.stat] >= cond.value) {
                        unlocked = true;
                    }
                } else if (cond.type === 'itemUse') {
                    if ((gameData.itemUseCount[cond.item] || 0) >= cond.count) {
                        unlocked = true;
                        if (cond.item === 'coffee') unlockGallery('g_addict');
                    }
                } else if (cond.type === 'eventFlag') {
                    if (gameData.eventFlags[cond.flag] || (cond.flag === 'hasCat' && gameData.hasCat)) {
                        unlocked = true;
                    }
                } else if (cond.type === 'eventCount') {
                    if (gameData[cond.eventType + 'Count'] >= cond.count) {
                        unlocked = true;
                    }
                }
                
                if (unlocked) {
                    gameData.unlockedAchievements.push(ach.id);
                    addLog(`🏆 达成成就：${ach.name}！`, 'log-reward');
                    
                    if (ach.reward) {
                        Object.entries(ach.reward).forEach(([stat, val]) => {
                            if (gameData.stats[stat] !== undefined) {
                                updateStat(stat, val);
                            }
                            showToast(stat, val);
                        });
                    }
                    
                    if (ach.id === 'scholar') unlockGallery('g_scholar');
                    if (ach.id === 'rich') unlockGallery('g_rich');
                    
                    renderAchievementsPanel();
                    updateUI();
                }
            });
        }

        function performAction(action) {
            gameData.actionsLeft--;
            
            checkAndUnlockSkill(action);
            
            const actionEffects = {
                study: { name: '学习', base: { study: 10, happy: -5, health: -2 } },
                attendClass: { name: '上课', base: { study: 8, happy: -3, health: -1 } },
                partTimeJob: { name: '兼职', base: { money: 200, study: -5, happy: -5, health: -5 } },
                socialize: { name: '社交', base: { social: 10, happy: 5, study: -3 } },
                exercise: { name: '锻炼', base: { health: 10, happy: 5, study: -2 } },
                rest: { name: '休息', base: { health: 8, happy: 8, study: -1 } },
                playGame: { name: '打游戏', base: { happy: 10, health: -3, study: -8 } },
                readBook: { name: '看书', base: { study: 7, happy: 3, health: -1 } }
            };
            
            const effect = actionEffects[action];
            if (effect) {
                let finalEffects = { ...effect.base };
                
                gameData.unlockedSkills.forEach(skillId => {
                    const skill = SKILLS_DATA.find(s => s.id === skillId);
                    if (skill && skill.buff && skill.buff.action === action) {
                        finalEffects[skill.buff.stat] = (finalEffects[skill.buff.stat] || 0) + skill.buff.value;
                    }
                });
                
                finalEffects = applyMoodToEffects(finalEffects);
                
                Object.entries(finalEffects).forEach(([stat, value]) => {
                    if (gameData.stats[stat] !== undefined) {
                        updateStat(stat, value);
                    }
                    showToast(stat, value);
                });
                
                addLog(`进行了 ${effect.name} 行动`, 'log-default');
                
                applySocialBonus(action);
                updateTaskProgress(action);
                
                if (checkGameOver()) { endGame(); return; }
                if (gameData.actionsLeft <= 0) endWeek();
                
                updateUI();
                checkAchievements();
            }
        }

        function endWeek() {
            checkExamWeek(); 
            
            gameData.week++;
            gameData.actionsLeft = 7;
            
            gameData.stats.health = Math.max(0, Math.min(100, gameData.stats.health - 2));
            gameData.stats.happy = Math.max(0, Math.min(100, gameData.stats.happy - 1));
            
            addRelation('classmate', Math.floor(Math.random()*3)-1);
            addRelation('clubber', Math.floor(Math.random()*3)-1);
            addRelation('counselor', Math.floor(Math.random()*3)-1);
            
            addLog(`第 ${gameData.week-1} 周结束，进入第 ${gameData.week} 周`, 'log-event');
            
            generateNewTask();
            
            if (checkGameOver()) { endGame(); return; }
            if (gameData.week > gameData.maxWeeks) {
                checkAchievements();
                endGame(); 
                return;
            }
            
            if (Math.random() > 0.4) showRandomEvent();
            
            updateUI();
            checkAchievements();
        }

        function checkGameOver() {
            if (gameData.stats.health <= 0) return true;
            return Object.values(gameData.stats).some(v => v < 0);
        }

            const toast = document.createElement('div');
            const type = stat === 'skill' ? 'stat-skill' : (value > 0 ? 'stat-plus' : 'stat-minus');
            toast.className = `stat-toast ${type}`;
            toast.textContent = `${statNames[stat] || stat}: ${value > 0 ? '+' : ''}${value}`;
            dom.toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 1800);
        }

                    dom.storyModal.classList.remove('active');
                    addLog('开始了大一上学期的生活', 'log-story');
                    addLog('收到开学礼包：咖啡x1，感冒药x1，能量饮料x1', 'log-reward');
                    choiceBtn.removeEventListener('click', handleInitial);
                });
            }
            
            dom.storyModal.classList.add('active');
        }

        function unlockGallery(id) {
            if (!gameData.unlockedGallery.includes(id)) {
                gameData.unlockedGallery.push(id);
                renderGalleryPanel();
            }
        }

        function checkAndUnlockSkill(action) {
            gameData.actionCounts[action] = (gameData.actionCounts[action] || 0) + 1;
            SKILLS_DATA.forEach(skill => {
                if (gameData.unlockedSkills.includes(skill.id)) return;
                const cond = skill.condition;
                if (cond.type === 'action' && cond.action === action) {
                    if (gameData.actionCounts[action] >= cond.count) {
                        gameData.unlockedSkills.push(skill.id);
                        addLog(`🎉 解锁技能：${skill.name}！${skill.desc}`, 'log-skill');
                        showToast('skill', `解锁：${skill.name}`);
                        renderSkillsPanel();
                    }
                }
            });
        }

        function bindEvents() {
            dom.actionsPanel.addEventListener('click', (e) => {
                if (e.target.classList.contains('action-btn') && gameData.actionsLeft > 0) {
                    performAction(e.target.dataset.action);
                }
            });
            dom.storyClose.addEventListener('click', () => dom.storyModal.classList.remove('active'));
            dom.restartBtn.addEventListener('click', restartGame);
            dom.guideBtn.addEventListener('click', handleGuideNext);
        }

        function updateUI() {
            dom.weekValue.textContent = `${gameData.week}/${gameData.maxWeeks}`;
            dom.healthValue.textContent = gameData.stats.health;
            dom.studyValue.textContent = gameData.stats.study;
            dom.socialValue.textContent = gameData.stats.social;
            dom.moneyValue.textContent = gameData.stats.money;
            dom.happyValue.textContent = gameData.stats.happy;
            
            dom.actionProgress.textContent = `本周剩余行动: ${gameData.actionsLeft}`;
            
            Object.entries(gameData.stats).forEach(([key, value]) => {
                const el = dom[`${key}Value`];
                if (el) el.classList.toggle('highlight', value < 30);
            });
            
            const logCount = dom.logList.children.length;
            dom.logProgress.textContent = `总事件: ${logCount}`;

            updateWeekHint();
            updateAdvice();
            updateTaskHint();
            updatePetHint();
            renderRelationshipPanel();
        }

        function endGame() {
            unlockGallery('g_survive');
            
            let endingTitle = '';
            let endingDesc = '';
            const avgStat = (gameData.stats.study + gameData.stats.social + gameData.stats.health + gameData.stats.happy) / 4;
            
            if (avgStat >= 80) {
                endingTitle = '完美开局';
                endingDesc = '你的大一上学期表现堪称完美！';
                unlockGallery('g_perfect');
            } else if (avgStat >= 60) {
                endingTitle = '平稳过渡';
                endingDesc = '你的大一上学期过得还算顺利。';
            } else if (avgStat >= 40) {
                endingTitle = '挣扎前行';
                endingDesc = '你的大一上学期过得有些艰难。';
            } else {
                endingTitle = '迷茫开局';
                endingDesc = '你的大一上学期过得不太理想。';
            }
            
            dom.endingTitle.textContent = endingTitle;
            dom.endingDesc.textContent = endingDesc;
            dom.endingStatsGrid.innerHTML = `
                <div class="ending-stat-item"><div class="status-label">学业</div><div class="status-value">${gameData.stats.study}</div></div>
                <div class="ending-stat-item"><div class="status-label">社交</div><div class="status-value">${gameData.stats.social}</div></div>
                <div class="ending-stat-item"><div class="status-label">健康</div><div class="status-value">${gameData.stats.health}</div></div>
                <div class="ending-stat-item"><div class="status-label">金钱</div><div class="status-value">${gameData.stats.money}</div></div>
                <div class="ending-stat-item"><div class="status-label">快乐</div><div class="status-value">${gameData.stats.happy}</div></div>
                <div class="ending-stat-item"><div class="status-label">综合</div><div class="status-value">${Math.round(avgStat)}</div></div>
            `;
            
            dom.endingModal.classList.add('active');
        }

        function restartGame() {
            gameData.week = 1;
            gameData.actionsLeft = 7;
            gameData.stats = { health: 100, study: 0, social: 0, money: 2000, happy: 80 };
            gameData.actionCounts = {};
            gameData.unlockedSkills = [];
            gameData.unlockedAchievements = [];
            gameData.inventory = { coffee: 1, medicine: 1, energyDrink: 1, catFood: 0, mysteriousCharm: 0 };
            gameData.unlockedGallery = [];
            gameData.itemUseCount = {};
            gameData.relations = { classmate: 20, clubber: 20, counselor: 20 };
            gameData.currentTask = null;
            gameData.taskProgress = 0;
            gameData.taskCompleted = false;
            gameData.hasCat = false;
            gameData.catHappy = 0;
            gameData.horrorEventCount = 0;
            gameData.metMerchant = false;
            gameData.eventFlags = {};
            
            unlockGallery('g_start');
            generateNewTask();
            
            dom.logList.innerHTML = '<li class="log-item log-default"><span class="log-time">第1周</span>欢迎回到大一上学期·趣味版！</li>';
            dom.endingModal.classList.remove('active');
            
            updateUI();
            renderAllPanels();
            showInitialStory();
        }

        // 引导
        const guideSteps = [
            { target: '#weekValue', title: '周数', text: '大一上学期共16周，把握好时间！', position: 'bottom' },
            { target: '.action-btn[data-action="study"]', title: '行动', text: '点击按钮进行行动，提升各项能力！', position: 'top' },
            { target: '#skillsList', title: '技能', text: '多次行动可解锁技能，获得永久加成！', position: 'left' },
            { target: '#itemsGrid', title: '物品', text: '点击物品可直接使用，获得即时效果！', position: 'left' },
            { target: '#relationshipGrid', title: '人际关系', text: '与同学老师的好感会影响行动效果！', position: 'left' }
        ];
        let currentGuideStep = 0;

        function startGuide() {
            gameData.isGuideActive = true;
            currentGuideStep = 0;
            dom.guideOverlay.classList.add('active');
            showGuideStep();
        }

        function showGuideStep() {
            if (currentGuideStep >= guideSteps.length) { endGuide(); return; }
            const step = guideSteps[currentGuideStep];
            const target = document.querySelector(step.target);
            if (!target) { currentGuideStep++; showGuideStep(); return; }
            const rect = target.getBoundingClientRect();
            dom.guideHighlight.style.cssText = `width:${rect.width+20}px;height:${rect.height+20}px;left:${rect.left-10}px;top:${rect.top-10}px;display:block;`;
            let x = rect.left;
            let y = step.position === 'top' ? rect.top - 180 : rect.bottom + 15;
            dom.guideTitle.textContent = step.title;
            dom.guideText.textContent = step.text;
            dom.guideTooltip.style.cssText = `left:${Math.max(10, Math.min(x, window.innerWidth-340))}px;top:${Math.max(10, y)}px;display:block;`;
            dom.guideBtn.textContent = currentGuideStep === guideSteps.length - 1 ? '开始游戏！' : '下一步';
        }

        function handleGuideNext() {
            if (!gameData.isGuideActive) return;
            currentGuideStep++;
            showGuideStep();
        }

        function endGuide() {
            gameData.isGuideActive = false;
            gameData.hasPlayedGuide = true;
            try { localStorage.setItem('hasPlayedGuide', 'true'); } catch (e) {}
            dom.guideOverlay.classList.remove('active');
            dom.guideHighlight.style.display = 'none';
            dom.guideTooltip.style.display = 'none';
            showInitialStory();
            addLog('🎉 完成新手引导！开始你的大一生活吧！', 'log-story');
        }

        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
